<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>EasyLink · Vista en Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060910;--s3:#1e2736;
  --border2:rgba(255,255,255,.15);
  --primary:#2563eb;--primary-glow:rgba(37,99,235,.4);
  --text:#e2e8f0;--muted:#64748b;
  --font:'Space Grotesk',sans-serif;
}
html{width:100%;height:100%;background:#000;overflow:hidden}
body{
  width:100%;height:100%;background:#000;
  font-family:var(--font);color:var(--text);overflow:hidden;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* ── PANTALLAS ── */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .4s;z-index:5;
}
.screen.hidden{opacity:0;pointer-events:none}

/* ── CONECTANDO ── */
#screen-connecting{gap:20px;background:var(--bg)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.brand-icon{
  width:44px;height:44px;border-radius:13px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 28px var(--primary-glow);
}
.brand-name{font-size:22px;font-weight:700;letter-spacing:-.02em}
.brand-name span{color:#60a5fa}
.spinner{
  width:44px;height:44px;border-radius:50%;
  border:3px solid #1e2736;border-top-color:var(--primary);
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.connect-msg{font-size:14px;color:var(--muted);text-align:center;max-width:260px;line-height:1.6}
.connect-sub{font-size:11px;color:#1e2736;margin-top:4px;font-family:monospace}

/* ── EN VIVO ── */
#screen-live{background:#000;padding:0;z-index:1}

/* VIDEO: ocupa TODO el viewport, sin bordes ni barras */
#remote-video{
  position:fixed;inset:0;
  width:100%;height:100%;
  object-fit:contain;   /* Muestra todo el contenido sin recortar */
  background:#000;
  z-index:1;display:block;
}
/* Modo LLENAR: recorta para que no haya franjas negras */
#screen-live.fill-mode #remote-video{object-fit:cover}

/* ── BARRA SUPERIOR ── */
#top-bar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding-top:max(env(safe-area-inset-top),10px);
  padding-left:16px;padding-right:16px;padding-bottom:28px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,transparent 100%);
  display:flex;align-items:center;gap:10px;
  transition:opacity .3s,transform .3s;
}
#top-bar.hide{opacity:0;transform:translateY(-100%);pointer-events:none}
.top-logo{display:flex;align-items:center;gap:8px}
.top-logo-icon{
  width:30px;height:30px;border-radius:9px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px var(--primary-glow);
}
.top-logo-name{font-size:14px;font-weight:700}
.top-logo-name span{color:#60a5fa}
.top-spacer{flex:1}
.live-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(239,68,68,.85);
  padding:5px 12px;border-radius:99px;
  font-size:10px;font-weight:700;letter-spacing:.09em;
  box-shadow:0 2px 10px rgba(239,68,68,.4);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink .85s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── BARRA INFERIOR ── */
#bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding-bottom:max(env(safe-area-inset-bottom),14px);
  padding-left:20px;padding-right:20px;padding-top:48px;
  background:linear-gradient(to top,rgba(0,0,0,.78) 0%,transparent 100%);
  display:flex;align-items:flex-end;justify-content:flex-end;gap:12px;
  transition:opacity .3s,transform .3s;
}
#bottom-bar.hide{opacity:0;transform:translateY(100%);pointer-events:none}

/* Botones flotantes circulares */
.fab-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.fab{
  width:50px;height:50px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);
  background:rgba(15,20,30,.72);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;
  transition:transform .15s,background .15s;
  -webkit-appearance:none;outline:none;flex-shrink:0;
}
.fab:active{transform:scale(.86);background:rgba(60,60,80,.9)}
.fab.primary{
  background:rgba(37,99,235,.8);
  border-color:rgba(37,99,235,.5);
  box-shadow:0 0 22px var(--primary-glow);
}
.fab.primary:active{background:rgba(29,78,216,.95)}
.fab svg{width:20px;height:20px;pointer-events:none}
.fab-lbl{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.05em;text-align:center}

/* ── ERROR ── */
#screen-error{gap:16px;background:var(--bg);padding:40px}
.err-emoji{font-size:52px}
.err-title{font-size:20px;font-weight:700;color:#f87171;text-align:center}
.err-msg{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;max-width:280px}
.retry-btn{
  margin-top:8px;padding:12px 32px;border-radius:12px;
  background:var(--primary);color:#fff;
  font-size:14px;font-weight:600;border:none;cursor:pointer;
  font-family:var(--font);box-shadow:0 4px 18px var(--primary-glow);
  transition:transform .15s;
}
.retry-btn:active{transform:scale(.96)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:rgba(30,39,54,.95);border:1px solid var(--border2);
  color:var(--text);border-radius:12px;padding:10px 22px;
  font-size:12px;font-weight:500;z-index:100;pointer-events:none;
  opacity:0;white-space:nowrap;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transition:opacity .25s,transform .25s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── OVERLAY PLAY ── */
#play-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.78);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:50;cursor:pointer;gap:16px;
}
.play-icon{
  width:80px;height:80px;border-radius:50%;
  background:rgba(37,99,235,.85);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px var(--primary-glow);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 28px var(--primary-glow)}50%{box-shadow:0 0 56px var(--primary-glow)}}
#play-overlay p{color:rgba(255,255,255,.85);font-size:15px;font-weight:600}
</style>
</head>
<body>

<!-- ══ CONECTANDO ══ -->
<div class="screen" id="screen-connecting">
  <div class="brand">
    <div class="brand-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
    </div>
    <div class="brand-name">Easy<span>Link</span></div>
  </div>
  <div class="spinner"></div>
  <div class="connect-msg" id="connect-msg">Conectando con el presentador...</div>
  <div class="connect-sub" id="connect-sub"></div>
</div>

<!-- ══ EN VIVO ══ -->
<div class="screen hidden" id="screen-live">

  <!-- Video a pantalla completa -->
  <video id="remote-video" autoplay playsinline></video>

  <!-- Barra superior -->
  <div id="top-bar">
    <div class="top-logo">
      <div class="top-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
      </div>
      <div class="top-logo-name">Easy<span>Link</span></div>
    </div>
    <div class="top-spacer"></div>
    <div class="live-pill"><div class="live-dot"></div>EN VIVO</div>
  </div>

  <!-- Barra inferior: controles -->
  <div id="bottom-bar">

    <!-- Ajustar / Llenar -->
    <div class="fab-wrap">
      <button class="fab" id="btn-fit" onclick="toggleFit()" title="Ajustar / Llenar">
        <svg id="fit-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
        <svg id="fit-in" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polyline points="4 14 10 14 10 20"/>
          <polyline points="20 10 14 10 14 4"/>
          <line x1="10" y1="14" x2="3" y2="21"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
        </svg>
      </button>
      <div class="fab-lbl" id="fit-lbl">LLENAR</div>
    </div>

    <!-- Pantalla completa -->
    <div class="fab-wrap">
      <button class="fab primary" onclick="toggleFullscreen()" title="Pantalla completa">
        <svg id="fs-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 00-2 2v3"/>
          <path d="M21 8V5a2 2 0 00-2-2h-3"/>
          <path d="M3 16v3a2 2 0 002 2h3"/>
          <path d="M16 21h3a2 2 0 002-2v-3"/>
        </svg>
        <svg id="fs-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M8 3v3a2 2 0 01-2 2H3"/>
          <path d="M21 8h-3a2 2 0 01-2-2V3"/>
          <path d="M3 16h3a2 2 0 012 2v3"/>
          <path d="M16 21v-3a2 2 0 012-2h3"/>
        </svg>
      </button>
      <div class="fab-lbl" id="fs-lbl">COMPLETA</div>
    </div>

  </div>
</div>

<!-- ══ ERROR ══ -->
<div class="screen hidden" id="screen-error">
  <div class="err-emoji">📡</div>
  <div class="err-title" id="err-title">Sin señal</div>
  <div class="err-msg" id="err-msg">No se pudo conectar con el presentador.</div>
  <button class="retry-btn" onclick="location.reload()">Reintentar</button>
</div>

<div id="toast"></div>

<script>
var params  = new URLSearchParams(window.location.search);
var HOST_ID = params.get('host') || '';
var MY_NAME = params.get('name') || 'Cliente';
var peer=null, dataConn=null;
var isFill=false, ctrlsVisible=true, hideTimer=null;

// ── PANTALLAS ────────────────────────────────────────────────
function show(id){
  ['screen-connecting','screen-live','screen-error'].forEach(function(s){
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}

// ── CONTROLES AUTO-HIDE ──────────────────────────────────────
function showCtrl(){
  document.getElementById('top-bar').classList.remove('hide');
  document.getElementById('bottom-bar').classList.remove('hide');
  ctrlsVisible=true;
  clearTimeout(hideTimer);
  hideTimer=setTimeout(hideCtrl, 3500);
}
function hideCtrl(){
  document.getElementById('top-bar').classList.add('hide');
  document.getElementById('bottom-bar').classList.add('hide');
  ctrlsVisible=false;
}
document.addEventListener('click',function(e){
  if(document.getElementById('screen-live').classList.contains('hidden')) return;
  if(e.target.closest('.fab')) return;
  ctrlsVisible ? hideCtrl() : showCtrl();
});
document.addEventListener('mousemove',function(){
  if(!document.getElementById('screen-live').classList.contains('hidden')) showCtrl();
});
document.addEventListener('touchstart',function(){
  if(!document.getElementById('screen-live').classList.contains('hidden')) showCtrl();
},{passive:true});

// ── FULLSCREEN ───────────────────────────────────────────────
function toggleFullscreen(){
  var inFS=!!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement||document.msFullscreenElement);
  inFS ? doExitFS() : doEnterFS();
}
function doEnterFS(){
  var el=document.documentElement;
  if(el.requestFullscreen)            el.requestFullscreen({navigationUI:'hide'});
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
  else if(el.mozRequestFullScreen)    el.mozRequestFullScreen();
  else if(el.msRequestFullscreen)     el.msRequestFullscreen();
  else{ iosFS(true); updateFS(true); toast('Pantalla completa'); return; }
  try{ screen.orientation&&screen.orientation.lock&&screen.orientation.lock('landscape').catch(function(){}); }catch(e){}
}
function doExitFS(){
  if(document.exitFullscreen)            document.exitFullscreen();
  else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  else if(document.mozCancelFullScreen)  document.mozCancelFullScreen();
  else if(document.msExitFullscreen)     document.msExitFullscreen();
  else{ iosFS(false); updateFS(false); return; }
  try{ screen.orientation&&screen.orientation.unlock&&screen.orientation.unlock(); }catch(e){}
}
function iosFS(on){
  // iOS Safari: simular pantalla completa via CSS position:fixed
  document.body.style.position=on?'fixed':'';
  document.body.style.inset=on?'0':'';
  document.documentElement.style.background='#000';
}
function updateFS(isFS){
  document.getElementById('fs-enter').style.display=isFS?'none':'block';
  document.getElementById('fs-exit').style.display=isFS?'block':'none';
  document.getElementById('fs-lbl').textContent=isFS?'SALIR':'COMPLETA';
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'].forEach(function(ev){
  document.addEventListener(ev,function(){
    var isFS=!!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);
    updateFS(isFS);
  });
});
document.addEventListener('keydown',function(e){
  if(e.key==='f'||e.key==='F'||e.key==='F11'){ e.preventDefault(); toggleFullscreen(); }
  if(e.key==='Escape') updateFS(false);
});

// ── AJUSTE IMAGEN ────────────────────────────────────────────
function toggleFit(){
  isFill=!isFill;
  document.getElementById('screen-live').classList.toggle('fill-mode',isFill);
  document.getElementById('fit-out').style.display=isFill?'none':'block';
  document.getElementById('fit-in').style.display=isFill?'block':'none';
  document.getElementById('fit-lbl').textContent=isFill?'AJUSTAR':'LLENAR';
  toast(isFill?'Modo Llenar (sin franjas negras)':'Modo Ajustar (todo visible)');
}

// ── PEER / WEBRTC ────────────────────────────────────────────
function init(){
  if(!HOST_ID){ showError('Sin presentador','No se encontró el ID del presentador en el link.'); return; }
  document.getElementById('connect-sub').textContent='Sesión: '+HOST_ID.slice(0,8)+'...';

  peer=new Peer({debug:0});

  peer.on('open',function(){
    dataConn=peer.connect(HOST_ID,{reliable:true});
    dataConn.on('open',function(){ dataConn.send({type:'viewer-hello',name:MY_NAME}); });
    dataConn.on('error',function(e){ console.warn('data',e); });
  });

  peer.on('call',function(call){
    call.answer(); // sin cámara propia, solo recibimos

    call.on('stream',function(remoteStream){
      var vid=document.getElementById('remote-video');
      vid.srcObject=remoteStream;

      var p=vid.play();
      if(p!==undefined){
        p.then(function(){ show('screen-live'); showCtrl(); toast('Conectado — toca la pantalla para controles'); })
         .catch(function(){ show('screen-live'); overlayPlay(); });
      } else {
        show('screen-live'); showCtrl();
      }
    });

    call.on('error',function(e){ console.warn('call err',e); });
    call.on('close',function(){ showError('Transmisión finalizada','El presentador detuvo la demo.'); });
  });

  peer.on('error',function(e){
    if(e.type==='peer-unavailable'){
      showError('Presentador no disponible','La sesión no está activa. Pide que inicien la demo y reintenta.');
    } else {
      document.getElementById('connect-msg').textContent='Reintentando conexión...';
      setTimeout(function(){ location.reload(); },4000);
    }
  });
}

function overlayPlay(){
  var o=document.createElement('div');
  o.id='play-overlay';
  o.innerHTML='<div class="play-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><p>Toca para ver la transmisión</p>';
  o.onclick=function(){ document.getElementById('remote-video').play(); o.remove(); showCtrl(); };
  document.body.appendChild(o);
}

function showError(t,m){
  document.getElementById('err-title').textContent=t;
  document.getElementById('err-msg').textContent=m;
  show('screen-error');
}

var _tt;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(function(){ el.classList.remove('show'); },2800);
}

init();
</script>
</body>
</html>
