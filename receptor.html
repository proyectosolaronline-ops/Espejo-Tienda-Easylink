<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Live Shopping — Easylink</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --lime: #c8f03a; --bg: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: sans-serif; }
        #tienda-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 1; background: #fff; }
        
        #vid-container {
            position: fixed; top: 15px; right: 15px;
            width: 110px; height: 195px; border-radius: 12px;
            overflow: hidden; z-index: 1000;
            border: 2px solid var(--lime); background: #000;
            display: none; box-shadow: 0 8px 30px rgba(0,0,0,0.8);
        }
        #vid-container.fs { top: 0; right: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }

        #waiting {
            position: fixed; inset: 0; z-index: 2000;
            background: var(--bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #btn-join {
            padding: 20px 40px; border: none; border-radius: 12px;
            background: var(--lime); color: #000; font-weight: 800;
            font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>

    <iframe id="tienda-frame" src="about:blank"></iframe>

    <div id="waiting">
        <h1 style="color:var(--lime); margin-bottom:20px;">EASYLINK</h1>
        <button id="btn-join" onclick="initLive()">ENTRAR AL LIVE</button>
    </div>

    <div id="vid-container" onclick="toggleFS()">
        <video id="remote-video" autoplay playsinline muted></video>
    </div>

<script>
    const params = new URLSearchParams(location.search);
    const HOST_ID = params.get('host');
    const STORE = params.get('url');

    if(STORE) document.getElementById('tienda-frame').src = STORE;

    function toggleFS() {
        const c = document.getElementById('vid-container');
        const v = document.getElementById('remote-video');
        c.classList.toggle('fs');
        v.muted = false;
        v.play(); // Forzar play al tocar
    }

    function initLive() {
        if(!HOST_ID) return alert("ID Host ausente");
        
        document.getElementById('waiting').style.display = 'none';
        document.getElementById('vid-container').style.display = 'block';

        const peer = new Peer();

        peer.on('open', (id) => {
            // El truco maestro: El receptor "llama" al host para forzar el handshake
            // Esto evita la pantalla negra por espera pasiva
            const conn = peer.connect(HOST_ID); 
            
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    const vid = document.getElementById('remote-video');
                    vid.srcObject = stream;
                    
                    // Asegurar el play después de que el stream cargue
                    vid.onloadedmetadata = () => {
                        vid.play().catch(e => console.error("Error play:", e));
                    };
                });
            });
        });

        peer.on('error', (err) => {
            console.error("Error PeerJS:", err);
            location.reload(); 
        });
    }
</script>
</body>
</html>
