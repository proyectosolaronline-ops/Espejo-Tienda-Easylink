<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Experience</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #a3e635; --dark: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: var(--dark); font-family: sans-serif; overflow: hidden; }

        /* Contenedor Principal */
        #main-wrapper { position: relative; width: 100%; height: 100%; }

        /* Capa 1: El Video del Vendedor (Emulación Celular) */
        #vendedor-view {
            position: absolute; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            background: #000; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Capa 2: La Tienda Interactiva del Cliente */
        #cliente-view {
            position: absolute; inset: 0; z-index: 5;
            background: #fff; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Botón Flotante para Intercalar */
        #switch-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: var(--primary); color: #064e3b;
            padding: 12px 24px; border-radius: 30px; font-weight: 800;
            border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: none; cursor: pointer; text-transform: uppercase; font-size: 14px;
        }

        /* Overlay de Inicio */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; color: white;
        }
        #btn-go {
            background: var(--primary); color: #064e3b; border: none;
            width: 100px; height: 100px; border-radius: 50%; font-weight: 900;
            margin-top: 20px; cursor: pointer;
        }

        .view-active-video #vendedor-view { transform: translateY(0); }
        .view-active-video #cliente-view { transform: translateY(100%); }
        
        .view-active-shop #vendedor-view { transform: translateY(-100%); }
        .view-active-shop #cliente-view { transform: translateY(0); }
    </style>
</head>
<body class="view-active-video">

    <div id="overlay">
        <h2>CONEXIÓN EN VIVO</h2>
        <p>Estás entrando a la tienda de un asesor</p>
        <button id="btn-go" onclick="startExperience()">ENTRAR</button>
    </div>

    <div id="main-wrapper">
        <button id="switch-btn" onclick="toggleView()">Ver mi navegación</button>

        <div id="vendedor-view">
            <video id="remote-video" autoplay playsinline></video>
        </div>

        <div id="cliente-view">
            <iframe id="tienda-iframe" src=""></iframe>
        </div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const hostId = params.get('host');
    const tiendaUrl = params.get('url');
    let currentMode = 'vendedor'; // vendedor o cliente

    function startExperience() {
        if (!hostId) return alert("Error de conexión");
        
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('switch-btn').style.display = 'block';
        if(tiendaUrl) document.getElementById('tienda-iframe').src = tiendaUrl;

        const peer = new Peer();
        peer.on('open', () => {
            peer.connect(hostId);
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    const v = document.getElementById('remote-video');
                    v.srcObject = stream;
                    v.play();
                });
            });
        });
    }

    function toggleView() {
        const body = document.body;
        const btn = document.getElementById('switch-btn');
        
        if (currentMode === 'vendedor') {
            body.classList.replace('view-active-video', 'view-active-shop');
            btn.textContent = "Ver al Vendedor";
            currentMode = 'cliente';
        } else {
            body.classList.replace('view-active-shop', 'view-active-video');
            btn.textContent = "Ver mi navegación";
            currentMode = 'vendedor';
        }
    }
</script>
</body>
</html>
