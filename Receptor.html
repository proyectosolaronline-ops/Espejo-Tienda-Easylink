<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Live Shopping — Easylink</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --lime:#c8f03a;--ld:rgba(200,240,58,.13);--lb:rgba(200,240,58,.28);
  --red:#ef4444;--green:#22c55e;
  --bg:#0a0a0a;--s:rgba(255,255,255,.05);--b:rgba(255,255,255,.09);
  --t:rgba(255,255,255,.92);--m:rgba(255,255,255,.45);--h:rgba(255,255,255,.2);
  --r:14px;--rp:99px;
  --safe:env(safe-area-inset-bottom,0px);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'DM Sans',system-ui,sans-serif;color:var(--t);}

/* ── TIENDA DE FONDO ── */
#tienda-frame{
  position:fixed;inset:0;width:100%;height:100%;
  border:none;z-index:1;background:#fff;
}

/* ── VIDEO FLOTANTE / FULLSCREEN ── */
#vid-container{
  position:fixed;
  top:14px;right:14px;
  width:120px;height:213px;
  border-radius:14px;overflow:hidden;
  z-index:1000;
  border:2px solid var(--lime);
  background:#000;
  display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.75),0 0 0 1px rgba(200,240,58,.15);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
#vid-container.fs{
  top:0;right:0;
  width:100vw!important;height:100vh!important;
  border-radius:0;border:none;
}
#vid-container video{
  width:100%;height:100%;
  object-fit:cover;pointer-events:none;
  display:block;
}

/* LIVE TAG */
#live-tag{
  position:absolute;top:7px;left:7px;z-index:10;
  display:flex;align-items:center;gap:4px;
  background:rgba(239,68,68,.9);
  padding:3px 8px;border-radius:var(--rp);
  font-size:9px;font-weight:800;font-family:'Syne',sans-serif;
  color:#fff;letter-spacing:.06em;
}
#live-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* EXPAND HINT */
#expand-hint{
  position:absolute;bottom:7px;right:7px;z-index:10;
  background:rgba(0,0,0,.6);border-radius:6px;
  padding:3px 5px;
}
#vid-container.fs #expand-hint{display:none;}

/* ── PANTALLA DE ESPERA ── */
#waiting{
  position:fixed;inset:0;z-index:500;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;padding:32px;
}
#waiting.hidden{display:none;}

/* Logo grande */
#w-logo{
  display:flex;align-items:center;gap:10px;
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  color:var(--lime);letter-spacing:.12em;margin-bottom:32px;
}
#w-logo-icon{
  width:44px;height:44px;border-radius:14px;
  background:var(--ld);border:1px solid var(--lb);
  display:flex;align-items:center;justify-content:center;
}

/* Tienda preview pill */
#w-store{
  display:flex;align-items:center;gap:8px;
  background:var(--s);border:1px solid var(--b);
  padding:10px 14px;border-radius:var(--r);
  margin-bottom:28px;width:100%;max-width:320px;
}
#w-store-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  animation:pg 1.5s infinite;flex-shrink:0;}
@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
#w-store-url{flex:1;font-size:10px;font-family:'DM Mono',monospace;color:var(--m);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* JOIN BUTTON */
#btn-join{
  width:100%;max-width:320px;
  padding:18px;border:none;border-radius:var(--r);
  background:var(--lime);color:#1a2600;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
  letter-spacing:.04em;cursor:pointer;
  box-shadow:0 0 32px rgba(200,240,58,.25);
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
#btn-join:active{transform:scale(.97);}
#btn-join:disabled{opacity:.4;cursor:not-allowed;}
#btn-join.connecting{background:rgba(200,240,58,.15);color:var(--lime);
  border:1px solid var(--lb);}

#w-sub{margin-top:14px;font-size:11px;color:var(--h);text-align:center;
  max-width:240px;line-height:1.7;}

/* ── HUD FLOTANTE (cuando está en live) ── */
#hud-live{
  position:fixed;bottom:0;left:0;right:0;z-index:900;
  padding:10px 14px calc(10px + var(--safe));
  background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.6) 70%,transparent 100%);
  display:none;
  flex-direction:column;gap:8px;
  transition:opacity .3s;
}
#hud-live.on{display:flex;}
#hud-live.hide{opacity:0;pointer-events:none;}

#hud-row{display:flex;align-items:center;gap:8px;}
#hud-logo{
  display:flex;align-items:center;gap:5px;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:800;
  color:var(--lime);letter-spacing:.1em;
}
#hud-logo-icon{
  width:22px;height:22px;border-radius:6px;
  background:var(--ld);border:1px solid var(--lb);
  display:flex;align-items:center;justify-content:center;
}
#hud-spacer{flex:1;}
#hud-status{
  display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.7);border:1px solid var(--b);
  padding:4px 9px;border-radius:var(--rp);
  font-size:9px;font-weight:700;font-family:'Syne',sans-serif;
  color:var(--m);
}
#hsdot{width:5px;height:5px;border-radius:50%;background:var(--green);
  animation:pg 1.5s infinite;}

#hud-btns{display:flex;gap:8px;}
#btn-fs{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px;border:1px solid var(--b);border-radius:var(--r);
  background:rgba(0,0,0,.7);
  font-family:'Syne',sans-serif;font-size:11px;font-weight:800;
  color:var(--t);cursor:pointer;letter-spacing:.03em;
  transition:all .18s;
}
#btn-fs:active{transform:scale(.97);}
#btn-share{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 16px;border:none;border-radius:var(--r);
  background:#25d366;color:#fff;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:800;
  transition:all .18s;
}
#btn-share:active{transform:scale(.97);}

/* HUD AUTO-HIDE TAP ZONE */
#tap-toggle{
  position:fixed;top:0;left:0;right:0;
  height:60%;z-index:800;
  display:none;
}
#tap-toggle.on{display:block;}

/* TOAST */
#toast{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  background:var(--lime);color:#1a2600;
  font-size:11px;font-weight:700;font-family:'Syne',sans-serif;
  padding:8px 18px;border-radius:var(--rp);
  z-index:9999;display:none;white-space:nowrap;letter-spacing:.03em;
}
#toast.show{display:block;animation:tin .22s ease;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-10px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* NO HOST */
#no-host{
  position:fixed;inset:0;z-index:600;background:var(--bg);
  display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:32px;text-align:center;
}
#no-host.on{display:flex;}
#no-host h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--m);}
#no-host p{font-size:12px;color:var(--h);max-width:220px;line-height:1.7;}
</style>
</head>
<body>

<!-- TIENDA FONDO -->
<iframe id="tienda-frame" src="about:blank"
  allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
  allowfullscreen></iframe>

<!-- VIDEO FLOTANTE -->
<div id="vid-container" onclick="toggleFS()">
  <div id="live-tag"><div id="live-dot"></div>EN VIVO</div>
  <video id="remote-video" autoplay playsinline muted></video>
  <div id="expand-hint">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white"
      stroke-width="2.5" stroke-linecap="round">
      <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
    </svg>
  </div>
</div>

<!-- PANTALLA DE ESPERA / JOIN -->
<div id="waiting">
  <div id="w-logo">
    <div id="w-logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#c8f03a">
        <circle cx="12" cy="12" r="4.5"/>
        <path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0"
          stroke="#c8f03a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    EASYLINK
  </div>

  <div id="w-store">
    <div id="w-store-dot"></div>
    <span id="w-store-url">Cargando tienda...</span>
  </div>

  <button id="btn-join" onclick="initLive()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <circle cx="12" cy="12" r="5"/>
      <path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0"
        stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    UNIRSE AL LIVE
  </button>
  <p id="w-sub">Toca para conectarte y ver la transmisión en vivo del vendedor.</p>
</div>

<!-- HUD EN LIVE -->
<div id="hud-live">
  <div id="hud-row">
    <div id="hud-logo">
      <div id="hud-logo-icon">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="#c8f03a">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0"
            stroke="#c8f03a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      EASYLINK
    </div>
    <div id="hud-spacer"></div>
    <div id="hud-status"><div id="hsdot"></div>En vivo</div>
  </div>
  <div id="hud-btns">
    <button id="btn-fs" onclick="toggleFS()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.2" stroke-linecap="round">
        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
      </svg>
      Ver pantalla completa
    </button>
    <button id="btn-share" onclick="shareLink()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Compartir
    </button>
  </div>
</div>

<!-- TAP PARA OCULTAR/MOSTRAR HUD -->
<div id="tap-toggle" onclick="toggleHUD()"></div>

<!-- NO HOST -->
<div id="no-host">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white"
    stroke-width="1.2" stroke-linecap="round" style="opacity:.2">
    <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"/>
  </svg>
  <h2>Sin transmisión</h2>
  <p>No se encontró el link del vendedor. Pide el link actualizado.</p>
</div>

<div id="toast"></div>

<script>
var params  = new URLSearchParams(location.search);
var HOST_ID = params.get('host');
var STORE   = params.get('url');
var hudVisible = true;
var hudTimer;

/* ── CARGAR TIENDA ── */
if(STORE){
  document.getElementById('tienda-frame').src = STORE;
  document.getElementById('w-store-url').textContent = STORE;
} else {
  document.getElementById('w-store-url').textContent = 'Sin URL de tienda';
}

if(!HOST_ID){
  document.getElementById('waiting').classList.add('hidden');
  document.getElementById('no-host').classList.add('on');
}

/* ── INIT LIVE ── */
function initLive(){
  if(!HOST_ID) return;
  var btn = document.getElementById('btn-join');
  btn.disabled = true;
  btn.classList.add('connecting');
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0"/></svg> Conectando...';

  var peer = new Peer({
    config:{iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'turn:a.relay.metered.ca:80',username:'open',credential:'open'},
      {urls:'turn:a.relay.metered.ca:443',username:'open',credential:'open'},
      {urls:'turn:a.relay.metered.ca:443?transport=tcp',username:'open',credential:'open'}
    ]}
  });

  peer.on('open', function(){
    // Conectar data channel para recibir URL si cambia
    var conn = peer.connect(HOST_ID);
    conn.on('data', function(d){
      if(d && d.type==='url' && d.url){
        document.getElementById('tienda-frame').src = d.url;
      }
    });

    // Escuchar llamada de video
    peer.on('call', function(call){
      call.answer(); // sin stream propio — solo recibimos
      call.on('stream', function(stream){
        var vid = document.getElementById('remote-video');
        vid.srcObject = stream;
        vid.muted = true;
        vid.play().catch(function(){
          vid.muted = true;
          vid.play();
        });
        showLive();
      });
      call.on('close', function(){ hideLive(); });
      call.on('error', function(){ hideLive(); });
    });
  });

  peer.on('error', function(e){
    toast('Error de conexión — reintenta');
    btn.disabled = false;
    btn.classList.remove('connecting');
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg> REINTENTAR';
  });
}

/* ── MOSTRAR / OCULTAR LIVE UI ── */
function showLive(){
  document.getElementById('waiting').classList.add('hidden');
  document.getElementById('vid-container').style.display = 'block';
  document.getElementById('hud-live').classList.add('on');
  document.getElementById('tap-toggle').classList.add('on');
  toast('✓ Conectado al live');
  autoHideHUD();
}

function hideLive(){
  document.getElementById('hud-live').classList.remove('on');
  document.getElementById('tap-toggle').classList.remove('on');
  toast('Transmisión finalizada');
}

/* ── FULLSCREEN VIDEO ── */
function toggleFS(){
  var c = document.getElementById('vid-container');
  var vid = document.getElementById('remote-video');
  c.classList.toggle('fs');
  // Activar audio al expandir
  if(c.classList.contains('fs')){
    vid.muted = false;
    vid.play().catch(function(){ vid.muted=true; vid.play(); });
  }
}

/* ── HUD AUTO-HIDE ── */
function toggleHUD(){
  hudVisible = !hudVisible;
  document.getElementById('hud-live').classList.toggle('hide', !hudVisible);
  if(hudVisible) autoHideHUD();
}

function autoHideHUD(){
  clearTimeout(hudTimer);
  hudTimer = setTimeout(function(){
    hudVisible = false;
    document.getElementById('hud-live').classList.add('hide');
  }, 4000);
}

/* ── SHARE ── */
function shareLink(){
  var url = location.href;
  if(navigator.share){
    navigator.share({title:'Ver tienda en vivo — Easylink', url:url});
  } else {
    navigator.clipboard.writeText(url).then(function(){ toast('✓ Link copiado'); });
  }
}

/* ── TOAST ── */
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  clearTimeout(t._tm);
  t._tm = setTimeout(function(){ t.className=''; }, 2600);
}

/* CSS spin */
var st = document.createElement('style');
st.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(st);
</script>
</body>
</html>
