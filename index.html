<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Transmisor — Easylink</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,sans-serif;color:#fff}

#iframe-tienda{
  position:fixed;top:0;left:0;width:100%;height:100%;
  border:none;z-index:1;background:#000;
}

#panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  z-index:100;width:100%;max-width:440px;
  padding:16px 16px 28px;
  background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.7) 80%,transparent 100%);
  display:flex;flex-direction:column;gap:10px;
  border-radius:16px 16px 0 0;
}

#url-input{
  padding:12px;border-radius:10px;
  border:1px solid rgba(200,240,58,.3);
  background:rgba(255,255,255,.05);color:#c8f03a;
  font-size:13px;outline:none;text-align:center;
}
#url-input::placeholder{color:rgba(255,255,255,.25)}

#btn-cargar{
  padding:12px;border-radius:10px;border:none;
  background:#c8f03a;color:#1a2600;
  font-weight:700;font-size:14px;cursor:pointer;
}

#status-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:10px;
  background:rgba(255,255,255,.04);
  font-size:12px;
}
#status-dot{
  width:8px;height:8px;border-radius:50%;
  background:#f59e0b;flex-shrink:0;
}
#status-dot.live{background:#22c55e}
#status-dot.off{background:#ef4444}

#link-row{
  display:none;align-items:center;gap:8px;
  padding:8px 12px;border-radius:10px;
  background:rgba(200,240,58,.05);
  border:1px solid rgba(200,240,58,.2);
}
#link-row.on{display:flex}
#link-text{
  flex:1;font-size:10px;color:#c8f03a;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#btn-copiar{
  padding:6px 14px;border-radius:8px;
  background:rgba(200,240,58,.15);border:1px solid rgba(200,240,58,.3);
  color:#c8f03a;font-size:11px;font-weight:700;cursor:pointer;
  white-space:nowrap;
}

#btn-transmitir{
  width:100%;padding:14px;border-radius:12px;border:none;
  font-weight:700;font-size:15px;cursor:pointer;
  background:#c8f03a;color:#1a2600;
}
#btn-transmitir.transmitiendo{background:#ef4444;color:#fff}
#btn-transmitir:disabled{opacity:.4;cursor:not-allowed}

#toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#c8f03a;color:#1a2600;
  padding:10px 20px;border-radius:99px;
  font-weight:700;font-size:12px;z-index:200;
  display:none;
}
#toast.show{display:block}
</style>
</head>
<body>

<iframe id="iframe-tienda" src="about:blank" allowfullscreen></iframe>

<div id="panel">
  <input id="url-input" type="url" placeholder="Pega la URL de tu tienda y presiona Cargar" autocomplete="off">
  <button id="btn-cargar" onclick="cargarTienda()">Cargar tienda</button>

  <div id="status-row">
    <div id="status-dot"></div>
    <span id="status-text">Esperando...</span>
  </div>

  <div id="link-row">
    <span id="link-text"></span>
    <button id="btn-copiar" onclick="copiarLink()">Copiar</button>
  </div>

  <button id="btn-transmitir" onclick="toggleTransmision()" disabled>Iniciar transmisión</button>
</div>

<div id="toast"></div>

<script>
// ─── Estado global ───
var pc = null;               // RTCPeerConnection
var displayStream = null;
var transmitiendo = false;
var tiendaURL = '';
var linkRecepcion = '';
var ofertaSDP = null;
var ofertaCreada = false;

// ─── Cargar tienda ───
function cargarTienda(){
  var url = document.getElementById('url-input').value.trim();
  if(!url){ toast('Pega una URL válida'); return; }
  if(!url.startsWith('http')){ toast('La URL debe empezar con http:// o https://'); return; }
  tiendaURL = url;
  document.getElementById('iframe-tienda').src = url;
  document.getElementById('btn-transmitir').disabled = false;
  setStatus('Tienda cargada. Listo para transmitir.', '');
  toast('Tienda cargada ✓');
}

// ─── Iniciar transmisión ───
async function iniciarTransmision(){
  if(!tiendaURL){ toast('Primero carga una tienda'); return; }

  try{
    // Capturar pantalla
    displayStream = await navigator.mediaDevices.getDisplayMedia({
      video:{ frameRate:{ ideal:30 }, width:{ ideal:1920 }, height:{ ideal:1080 } },
      audio: true,
      preferCurrentTab: true
    });

    // Si el usuario cierra el sharing desde el navegador
    displayStream.getVideoTracks()[0].addEventListener('ended', detenerTransmision);

    // Crear RTCPeerConnection
    pc = new RTCPeerConnection({
      iceServers:[
        { urls:'stun:stun.l.google.com:19302' },
        { urls:'stun:stun1.l.google.com:19302' }
      ]
    });

    // Agregar pistas locales
    displayStream.getTracks().forEach(function(track){
      pc.addTrack(track, displayStream);
    });

    // Esperar candidatos ICE
    pc.onicecandidate = function(e){
      if(e.candidate === null){
        // Todos los candidatos recolectados → generar oferta final
        ofertaSDP = btoa(JSON.stringify(pc.localDescription));
        ofertaCreada = true;
        generarLinkRecepcion();
        setStatus('Transmisión lista. Comparte el link.', 'live');
        toast('✓ Transmisión iniciada');
      }
    };

    // Crear oferta
    var offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // UI
    var btn = document.getElementById('btn-transmitir');
    btn.textContent = 'Detener transmisión';
    btn.classList.add('transmitiendo');
    transmitiendo = true;

  }catch(e){
    console.error(e);
    if(e.name === 'NotAllowedError'){
      toast('Permiso denegado. Debes compartir pantalla.');
    } else {
      toast('Error: ' + e.message);
    }
    detenerTransmision();
  }
}

// ─── Detener transmisión ───
function detenerTransmision(){
  if(displayStream){
    displayStream.getTracks().forEach(function(t){ t.stop(); });
    displayStream = null;
  }
  if(pc){
    pc.close();
    pc = null;
  }
  transmitiendo = false;
  ofertaSDP = null;
  ofertaCreada = false;

  var btn = document.getElementById('btn-transmitir');
  btn.textContent = 'Iniciar transmisión';
  btn.classList.remove('transmitiendo');
  document.getElementById('link-row').classList.remove('on');
  setStatus('Transmisión detenida', 'off');
  toast('Transmisión detenida');
}

// ─── Generar link para el receptor ───
function generarLinkRecepcion(){
  var base = location.href.replace(/[^/]*$/, '') + 'receptor.html';
  linkRecepcion = base + '#sdp=' + encodeURIComponent(ofertaSDP);
  if(tiendaURL){
    linkRecepcion += '&url=' + encodeURIComponent(tiendaURL);
  }
  document.getElementById('link-text').textContent = linkRecepcion;
  document.getElementById('link-row').classList.add('on');
}

// ─── Toggle ───
function toggleTransmision(){
  transmitiendo ? detenerTransmision() : iniciarTransmision();
}

// ─── Copiar link ───
function copiarLink(){
  if(!linkRecepcion) return;
  navigator.clipboard.writeText(linkRecepcion).then(function(){
    toast('Link copiado ✓');
  }).catch(function(){
    var ta = document.createElement('textarea');
    ta.value = linkRecepcion; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast('Link copiado ✓');
  });
}

// ─── Status UI ───
function setStatus(texto, estado){
  document.getElementById('status-text').textContent = texto;
  var dot = document.getElementById('status-dot');
  dot.className = estado === 'live' ? 'live' : estado === 'off' ? 'off' : '';
}

// ─── Toast ───
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.className = ''; }, 3000);
}
</script>
</body>
</html>
