<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Easylink — Transmisor</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --lime:#c8f03a;--lime-dim:rgba(200,240,58,.12);--lime-border:rgba(200,240,58,.28);
  --red:#ef4444;--green:#22c55e;
  --bg:#0a0a0a;--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.09);
  --text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.45);--hint:rgba(255,255,255,.2);
  --r:14px;--rSm:10px;--rPill:99px;
  --safe:env(safe-area-inset-bottom,0px);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'DM Sans',system-ui,sans-serif;color:var(--text);}

#app{display:flex;flex-direction:column;height:100%;}

/* IFRAME ZONE */
#preview{flex:1;position:relative;overflow:hidden;background:#050505;}
#store-frame{
  position:absolute;inset:0;width:100%;height:100%;border:none;
  opacity:0;transition:opacity .5s;
}
#store-frame.ready{opacity:1;}

/* OVERLAY de captura — cubre el iframe para interceptar eventos */
#capture-overlay{
  position:absolute;inset:0;z-index:10;
  cursor:crosshair;
  background:transparent;
}

/* EMPTY */
#empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:var(--muted);font-size:13px;text-align:center;padding:24px;
}
#empty svg{opacity:.18;}
#empty p{color:var(--hint);font-size:11px;max-width:200px;line-height:1.7;}

/* BADGES */
.badge{
  position:absolute;z-index:20;
  display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.8);
  padding:4px 9px;border-radius:var(--rPill);
  font-size:9px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.06em;
}
#badge-live{
  top:10px;right:10px;
  border:1px solid rgba(239,68,68,.4);color:#f87171;
  display:none;
}
#badge-live.on{display:flex;}
#live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#badge-viewers{
  top:10px;left:10px;
  border:1px solid var(--lime-border);color:var(--lime);
  display:none;
}
#badge-viewers.on{display:flex;}

/* CLICK RIPPLE */
.ripple{
  position:absolute;pointer-events:none;z-index:15;
  width:32px;height:32px;margin:-16px 0 0 -16px;
  border-radius:50%;background:rgba(200,240,58,.4);
  animation:ripple-out .6s ease-out forwards;
}
@keyframes ripple-out{0%{transform:scale(0);opacity:1}100%{transform:scale(2.5);opacity:0}}

/* SCROLL INDICATOR */
#scroll-bar{
  position:absolute;right:3px;top:0;bottom:0;width:3px;z-index:15;
  pointer-events:none;
}
#scroll-thumb{
  width:3px;border-radius:2px;background:rgba(200,240,58,.5);
  position:absolute;right:0;width:100%;
  transition:top .1s;
  min-height:40px;
}

/* HUD */
#hud{
  flex-shrink:0;background:var(--bg);
  padding:12px 14px calc(12px + var(--safe));
  display:flex;flex-direction:column;gap:9px;
  border-top:1px solid var(--border);
}

/* HEADER */
#hud-header{display:flex;align-items:center;justify-content:space-between;}
#logo{
  display:flex;align-items:center;gap:6px;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:800;
  color:var(--lime);letter-spacing:.1em;
}
#logo-icon{
  width:24px;height:24px;border-radius:7px;
  background:var(--lime-dim);border:1px solid var(--lime-border);
  display:flex;align-items:center;justify-content:center;
}
#status-pill{
  display:flex;align-items:center;gap:4px;
  background:var(--surface);border:1px solid var(--border);
  padding:4px 9px;border-radius:var(--rPill);
  font-size:9px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.04em;
  color:var(--muted);transition:all .3s;
}
#sdot{width:5px;height:5px;border-radius:50%;background:var(--muted);transition:background .3s;}
#sdot.live{background:var(--green);animation:pulse 1.5s infinite;}
#sdot.off{background:var(--red);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}

/* URL BAR */
#url-bar{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rSm);cursor:pointer;
  transition:border-color .2s;
}
#url-bar:active{border-color:rgba(255,255,255,.2);}
#url-label{
  flex:1;font-size:11px;font-family:'DM Mono',monospace;
  color:var(--hint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#url-label.set{color:var(--lime);}
#url-edit{font-size:9px;color:var(--hint);font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0;}

/* LINK ROW */
#link-row{
  display:none;align-items:center;gap:8px;
  padding:8px 12px;
  background:var(--lime-dim);border:1px solid var(--lime-border);
  border-radius:var(--rSm);
}
#link-row.on{display:flex;}
#link-val{
  flex:1;font-size:10px;font-family:'DM Mono',monospace;color:var(--lime);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#btn-copy{
  background:rgba(200,240,58,.18);border:1px solid var(--lime-border);
  color:var(--lime);font-size:9px;font-weight:700;letter-spacing:.04em;
  padding:4px 11px;border-radius:7px;cursor:pointer;
  white-space:nowrap;font-family:'Syne',sans-serif;
}
#btn-copy:active{background:rgba(200,240,58,.3);}

/* VIEWERS LIST */
#viewers-row{
  display:none;flex-wrap:wrap;gap:6px;
}
#viewers-row.on{display:flex;}
.viewer-chip{
  display:flex;align-items:center;gap:4px;
  background:var(--surface);border:1px solid var(--border);
  padding:3px 8px;border-radius:var(--rPill);
  font-size:9px;color:var(--muted);font-family:'Syne',sans-serif;
}
.viewer-chip-dot{width:4px;height:4px;border-radius:50%;background:var(--green);}

/* BTN ROW */
#btn-row{display:flex;gap:8px;}
#btn-sync{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:13px;border:none;border-radius:var(--r);cursor:pointer;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:.03em;
  background:var(--lime);color:#1a2600;transition:all .2s;
}
#btn-sync:active{transform:scale(.97);}
#btn-sync.live{background:var(--red);color:#fff;}
#btn-sync:disabled{opacity:.35;cursor:not-allowed;}
#btn-wa{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:13px 16px;border:none;border-radius:var(--r);
  background:#25d366;color:#fff;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:800;
  opacity:.3;pointer-events:none;transition:all .2s;
}
#btn-wa.ready{opacity:1;pointer-events:all;}
#btn-wa:active{transform:scale(.97);}

/* TOAST */
#toast{
  position:fixed;top:14px;left:50%;
  transform:translateX(-50%);
  background:var(--lime);color:#1a2600;
  font-size:11px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.03em;
  padding:8px 18px;border-radius:var(--rPill);
  z-index:999;display:none;white-space:nowrap;
}
#toast.show{display:block;animation:tin .2s ease;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* MODAL */
#modal{
  position:fixed;inset:0;z-index:900;
  background:rgba(0,0,0,.9);
  display:flex;align-items:flex-end;justify-content:center;
}
#modal.hidden{display:none;}
#modal-box{
  background:#111;border:1px solid var(--border);
  border-radius:24px 24px 0 0;
  padding:28px 20px calc(28px + var(--safe));
  width:100%;max-width:480px;
  animation:sup .3s cubic-bezier(.16,1,.3,1);
}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;margin-bottom:8px;}
#modal-sub{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:18px;}
#modal-input{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--lime-border);border-radius:var(--r);
  color:var(--lime);font-size:12px;font-family:'DM Mono',monospace;
  outline:none;margin-bottom:12px;transition:border-color .2s;
}
#modal-input:focus{border-color:rgba(200,240,58,.6);}
#modal-input::placeholder{color:var(--hint);}
#modal-ok{
  width:100%;padding:14px;border:none;border-radius:var(--r);
  background:var(--lime);color:#1a2600;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;transition:all .2s;
}
#modal-ok:active{transform:scale(.98);}
</style>
</head>
<body>
<div id="app">

  <div id="preview">
    <iframe id="store-frame" src="about:blank"
      allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
      allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"></iframe>

    <div id="capture-overlay"></div>

    <div id="empty">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        <path d="M7 10l3 3 7-6"/>
      </svg>
      <strong style="font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:rgba(255,255,255,.4);">Sin tienda</strong>
      <p>Carga la URL de tu tienda para iniciar el mirror en vivo.</p>
    </div>

    <div class="badge" id="badge-live"><div id="live-dot"></div>EN VIVO</div>
    <div class="badge" id="badge-viewers">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span id="viewers-n">0</span>
    </div>

    <div id="scroll-bar"><div id="scroll-thumb"></div></div>
  </div>

  <div id="hud">
    <div id="hud-header">
      <div id="logo">
        <div id="logo-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#c8f03a">
            <circle cx="12" cy="12" r="4.5"/>
            <path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="#c8f03a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        EASYLINK
      </div>
      <div id="status-pill"><div id="sdot"></div><span id="stext">Iniciando...</span></div>
    </div>

    <div id="url-bar" onclick="openModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--muted);flex-shrink:0"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      <span id="url-label">Carga la URL de tu tienda...</span>
      <span id="url-edit">Editar</span>
    </div>

    <div id="link-row">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#c8f03a" stroke-width="2.2" stroke-linecap="round" style="flex-shrink:0"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      <span id="link-val"></span>
      <button id="btn-copy" onclick="copyLink()">Copiar</button>
    </div>

    <div id="viewers-row"></div>

    <div id="btn-row">
      <button id="btn-sync" onclick="toggleSync()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="12" r="5"/>
          <path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
        Iniciar mirror
      </button>
      <button id="btn-wa" onclick="sendWhatsApp()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Enviar
      </button>
    </div>
  </div>
</div>

<div id="modal">
  <div id="modal-box">
    <div id="modal-title">🛍 URL de tu tienda</div>
    <p id="modal-sub">Pega la dirección. Se cargará aquí y sincronizarás scroll, clicks y navegación en tiempo real.</p>
    <input id="modal-input" type="url" placeholder="https://tu-tienda.github.io/..." autocomplete="off" spellcheck="false"/>
    <button id="modal-ok" onclick="cargarTienda()">Cargar tienda →</button>
  </div>
</div>

<div id="toast"></div>

<script>
var RECEPTOR_BASE = location.href.replace(/[^/]*$/, '') + 'receptor.html';
var peer, myPeerID, clientLink = '';
var connections = {};
var isLive = false;
var tiendaURL = '';
var scrollRatio = 0;
var lastScroll = 0;
var scrollTimer = null;

/* ── INIT ── */
(function(){
  var p = new URLSearchParams(location.search);
  var u = p.get('url') || p.get('store') || localStorage.getItem('el_url') || '';
  if(u){ tiendaURL = u; loadIframe(u); document.getElementById('modal').classList.add('hidden'); }
  else { document.getElementById('modal').classList.remove('hidden'); }
  initPeer();
})();

/* ── MODAL ── */
function openModal(){ document.getElementById('modal').classList.remove('hidden'); }
function cargarTienda(){
  var v = document.getElementById('modal-input').value.trim();
  if(!v){ toast('Pega la URL'); return; }
  if(!/^https?:\/\//i.test(v)){ toast('Debe empezar con https://'); return; }
  tiendaURL = v;
  localStorage.setItem('el_url', v);
  loadIframe(v);
  document.getElementById('modal').classList.add('hidden');
  if(myPeerID) rebuildLink();
  broadcast({type:'store-url', url:v});
}
document.getElementById('modal-input').addEventListener('keydown', function(e){ if(e.key==='Enter') cargarTienda(); });

function loadIframe(url){
  var f = document.getElementById('store-frame');
  f.src = url;
  f.onload = function(){
    f.classList.add('ready');
    document.getElementById('empty').style.display = 'none';
    document.getElementById('url-label').textContent = url;
    document.getElementById('url-label').classList.add('set');
    hookIframe();
  };
}

/* ── HOOK IFRAME EVENTS ── */
function hookIframe(){
  var f = document.getElementById('store-frame');
  var overlay = document.getElementById('capture-overlay');

  // Scroll via overlay (proxy de posición relativa)
  overlay.addEventListener('wheel', function(e){
    e.preventDefault();
    try{
      var fw = f.contentWindow;
      fw.scrollBy(0, e.deltaY);
      sendScroll(fw);
    }catch(x){}
  }, {passive:false});

  // Touch scroll en el overlay
  var touchY = 0;
  overlay.addEventListener('touchstart', function(e){ touchY = e.touches[0].clientY; }, {passive:true});
  overlay.addEventListener('touchmove', function(e){
    e.preventDefault();
    var dy = touchY - e.touches[0].clientY;
    touchY = e.touches[0].clientY;
    try{
      var fw = f.contentWindow;
      fw.scrollBy(0, dy);
      sendScroll(fw);
    }catch(x){}
  }, {passive:false});

  // Click en overlay → simula click en iframe
  overlay.addEventListener('click', function(e){
    var rect = overlay.getBoundingClientRect();
    var rx = (e.clientX - rect.left) / rect.width;
    var ry = (e.clientY - rect.top) / rect.height;

    // Ripple visual
    spawnRipple(e.clientX, e.clientY);

    // Enviar click relativo
    broadcast({type:'click', rx:rx, ry:ry});

    // Intentar click real en iframe
    try{
      var fw = f.contentWindow;
      var iw = fw.document.documentElement.scrollWidth;
      var ih = fw.document.documentElement.scrollHeight;
      var visH = fw.innerHeight;
      var scrollTop = fw.scrollY || 0;
      var absX = rx * fw.innerWidth;
      var absY = ry * visH + scrollTop;
      var el = fw.document.elementFromPoint(absX - fw.scrollX, ry * visH);
      if(el) el.click();
    }catch(x){}
  });

  // Escuchar scroll del iframe directamente
  try{
    f.contentWindow.addEventListener('scroll', function(){
      sendScroll(f.contentWindow);
    });
  }catch(x){}

  // Pollear scroll cada 200ms como fallback
  setInterval(function(){
    try{
      var fw = f.contentWindow;
      sendScroll(fw);
    }catch(x){}
  }, 300);
}

function sendScroll(fw){
  try{
    var scrollY = fw.scrollY || 0;
    var maxScroll = fw.document.documentElement.scrollHeight - fw.innerHeight;
    var ratio = maxScroll > 0 ? scrollY / maxScroll : 0;
    if(Math.abs(ratio - scrollRatio) > 0.002){
      scrollRatio = ratio;
      // Update thumb
      var thumb = document.getElementById('scroll-thumb');
      var bar = document.getElementById('scroll-bar');
      thumb.style.top = (ratio * (bar.clientHeight - 50)) + 'px';
      broadcast({type:'scroll', ratio:ratio, scrollY:scrollY});
    }
  }catch(x){}
}

function spawnRipple(x, y){
  var preview = document.getElementById('preview');
  var r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  preview.appendChild(r);
  setTimeout(function(){ r.remove(); }, 650);
}

/* ── PEERJS ── */
function initPeer(){
  setStatus('Conectando...','');
  peer = new Peer({debug:0, config:{
    iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'turn:a.relay.metered.ca:80',username:'open',credential:'open'},
      {urls:'turn:a.relay.metered.ca:443',username:'open',credential:'open'},
      {urls:'turn:a.relay.metered.ca:443?transport=tcp',username:'open',credential:'open'}
    ],
    iceCandidatePoolSize:10
  }});

  peer.on('open', function(id){
    myPeerID = id;
    rebuildLink();
    setStatus('Listo','');
    document.getElementById('btn-sync').disabled = false;
    document.getElementById('btn-wa').classList.add('ready');
    document.getElementById('link-row').classList.add('on');
  });

  peer.on('connection', function(conn){
    conn.on('open', function(){
      connections[conn.peer] = conn;
      updateViewers();
      // Enviar estado actual
      conn.send({type:'store-url', url:tiendaURL});
      conn.send({type:'sync-state', isLive:isLive, scrollRatio:scrollRatio});
    });
    conn.on('close', function(){ delete connections[conn.peer]; updateViewers(); });
    conn.on('error', function(){ delete connections[conn.peer]; updateViewers(); });
  });

  peer.on('error', function(){
    setStatus('Error — reintentando...','off');
    setTimeout(function(){ try{peer.destroy();}catch(x){} initPeer(); }, 3000);
  });
  peer.on('disconnected', function(){ setStatus('Reconectando...','off'); peer.reconnect(); });
}

function broadcast(msg){
  Object.keys(connections).forEach(function(pid){
    try{ connections[pid].send(msg); }catch(x){}
  });
}

function rebuildLink(){
  clientLink = RECEPTOR_BASE + '?host=' + encodeURIComponent(myPeerID);
  if(tiendaURL) clientLink += '&url=' + encodeURIComponent(tiendaURL);
  document.getElementById('link-val').textContent = clientLink;
}

/* ── TOGGLE SYNC ── */
function toggleSync(){
  isLive = !isLive;
  var btn = document.getElementById('btn-sync');
  if(isLive){
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pausar mirror';
    btn.classList.add('live');
    document.getElementById('badge-live').classList.add('on');
    setStatus(Object.keys(connections).length > 0 ? Object.keys(connections).length + ' viendo' : 'En vivo','live');
    broadcast({type:'sync-state', isLive:true, scrollRatio:scrollRatio});
    toast('✓ Mirror activo');
  } else {
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg> Iniciar mirror';
    btn.classList.remove('live');
    document.getElementById('badge-live').classList.remove('on');
    setStatus('Pausado','off');
    broadcast({type:'sync-state', isLive:false});
    toast('Mirror pausado');
  }
}

/* ── UI HELPERS ── */
function setStatus(txt, state){
  document.getElementById('stext').textContent = txt;
  var d = document.getElementById('sdot');
  d.className = state==='live' ? 'live' : state==='off' ? 'off' : '';
}

function updateViewers(){
  var n = Object.keys(connections).length;
  var el = document.getElementById('badge-viewers');
  document.getElementById('viewers-n').textContent = n;
  el.classList.toggle('on', n > 0);
  if(isLive) setStatus(n > 0 ? n + ' viendo' : 'En vivo', 'live');

  var row = document.getElementById('viewers-row');
  row.innerHTML = '';
  if(n > 0){
    row.classList.add('on');
    Object.keys(connections).forEach(function(pid, i){
      var chip = document.createElement('div');
      chip.className = 'viewer-chip';
      chip.innerHTML = '<div class="viewer-chip-dot"></div>Cliente ' + (i+1);
      row.appendChild(chip);
    });
  } else { row.classList.remove('on'); }
}

function copyLink(){
  if(!clientLink) return;
  navigator.clipboard.writeText(clientLink).then(function(){ toast('✓ Link copiado'); })
    .catch(function(){
      var ta = document.createElement('textarea');
      ta.value = clientLink; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      toast('✓ Link copiado');
    });
}

function sendWhatsApp(){
  if(!clientLink){ toast('Espera al link'); return; }
  var msg = '👀 *Mira mi tienda en vivo*\n\nAbre este link:\n' + clientLink;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className=''; }, 2500);
}
</script>
