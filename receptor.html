<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tienda Live — WebApp</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #a3e635; --dark: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: var(--dark); overflow: hidden; 
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* 1. LA TIENDA COMO BASE (WebApp) */
        #tienda-iframe {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            border: none; z-index: 1;
            background: #fff;
        }

        /* 2. EL TRANSMISOR COMO MINIATURA FLOTANTE (Style Instagram) */
        #video-container {
            position: absolute;
            top: 20px; right: 15px;
            width: 120px; height: 210px; /* Proporción vertical */
            border-radius: 16px;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 2px solid var(--primary);
            background: #000;
            display: none; /* Se activa al conectar */
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 3. OVERLAYS DE CONTROL */
        #btn-join {
            position: fixed; inset: 0; margin: auto;
            width: 140px; height: 140px; border-radius: 50%;
            background: var(--primary); border: none; color: #064e3b;
            font-weight: 800; font-size: 16px; cursor: pointer;
            z-index: 200; box-shadow: 0 0 40px rgba(163,230,53,0.6);
            animation: pulse 2s infinite;
        }

        .live-tag {
            position: absolute; top: 10px; left: 10px;
            background: #ef4444; color: white;
            padding: 3px 8px; border-radius: 4px;
            font-size: 10px; font-weight: bold;
            z-index: 10;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <button id="btn-join" onclick="startWebApp()">ENTRAR A LA TIENDA</button>

    <iframe id="tienda-iframe" src="about:blank"></iframe>

    <div id="video-container">
        <div class="live-tag">VIVO</div>
        <video id="remote-video" autoplay playsinline></video>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const hostId = params.get('host');
    const tiendaUrl = params.get('url');

    // Cargar la tienda de fondo de inmediato (sin esperar al video)
    if(tiendaUrl) document.getElementById('tienda-iframe').src = tiendaUrl;

    function startWebApp() {
        if (!hostId) return alert("Falta el ID del transmisor");
        
        document.getElementById('btn-join').style.display = 'none';
        document.getElementById('video-container').style.display = 'block';

        const peer = new Peer({
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', () => {
            const conn = peer.connect(hostId);
            
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    const video = document.getElementById('remote-video');
                    video.srcObject = stream;
                    video.play();
                });
            });
        });
    }
</script>
</body>
</html>
