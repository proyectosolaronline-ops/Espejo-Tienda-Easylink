<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Transmisor — Easylink Demo</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'DM Sans',system-ui,sans-serif;color:#fff}

/* ── IFRAME FULLSCREEN ── */
#tienda-frame{
  position:fixed;inset:0;
  width:100%;height:100%;
  border:none;
  z-index:1;
  background:#000;
}

/* ── GRAIN OVERLAY ── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:2;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;opacity:.4;
}

/* ── TOP BAR ── */
#top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,.9) 0%,transparent 100%);
  pointer-events:none;
}
#logo{
  display:flex;align-items:center;gap:8px;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;
  color:#c8f03a;letter-spacing:.08em;text-transform:uppercase;
  pointer-events:all;
}
#logo-icon{
  width:28px;height:28px;border-radius:8px;
  background:rgba(200,240,58,.12);border:1px solid rgba(200,240,58,.25);
  display:flex;align-items:center;justify-content:center;
}
#live-badge{
  display:none;align-items:center;gap:5px;
  background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);
  padding:4px 11px;border-radius:99px;
  font-size:10px;font-weight:700;color:#f87171;
  letter-spacing:.08em;text-transform:uppercase;
  pointer-events:all;
}
#live-badge.on{display:flex}
#live-badge-dot{width:5px;height:5px;border-radius:50%;background:#ef4444;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── HUD INFERIOR ── */
#hud{
  position:fixed;bottom:0;left:0;right:0;
  z-index:100;
  padding:12px 14px 20px;
  background:linear-gradient(to top,rgba(0,0,0,.97) 0%,rgba(0,0,0,.6) 60%,transparent 100%);
  display:flex;flex-direction:column;gap:10px;
}

/* STATUS */
#status-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
}
#status-dot{
  width:8px;height:8px;border-radius:50%;
  background:#f59e0b;flex-shrink:0;
  transition:background .3s;
}
#status-dot.live{background:#22c55e;animation:pulse-green 1.5s infinite}
#status-dot.off{background:#ef4444}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
#status-text{font-size:12px;font-weight:500;color:rgba(255,255,255,.7);flex:1;letter-spacing:.01em}
#viewers-pill{
  display:none;align-items:center;gap:4px;
  background:rgba(200,240,58,.1);border:1px solid rgba(200,240,58,.25);
  padding:3px 9px;border-radius:99px;
  font-size:10px;font-weight:700;color:#c8f03a;
}
#viewers-pill.on{display:flex}

/* LINK */
#link-row{
  display:none;align-items:center;gap:8px;
  padding:9px 12px;
  background:rgba(200,240,58,.05);
  border:1px solid rgba(200,240,58,.2);
  border-radius:12px;
}
#link-row.on{display:flex}
#link-text{
  flex:1;font-size:10px;color:#c8f03a;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:'DM Mono',monospace;letter-spacing:.01em;
}
#btn-copy{
  background:rgba(200,240,58,.12);border:1px solid rgba(200,240,58,.3);
  color:#c8f03a;font-size:10px;font-weight:700;
  padding:5px 12px;border-radius:8px;cursor:pointer;
  white-space:nowrap;font-family:inherit;transition:all .15s;
}
#btn-copy:hover{background:rgba(200,240,58,.2)}
#btn-copy:active{transform:scale(.96)}

/* BOTONES */
#btn-row{display:flex;gap:8px}

#btn-transmitir{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px;border-radius:14px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;font-family:'Syne',sans-serif;
  letter-spacing:.02em;
  transition:all .2s;
  background:#c8f03a;color:#1a2600;
}
#btn-transmitir:hover:not(:disabled){background:#d4f85e;transform:translateY(-1px)}
#btn-transmitir:active:not(:disabled){transform:scale(.98)}
#btn-transmitir.live{background:#ef4444;color:#fff}
#btn-transmitir.live:hover{background:#f87171}
#btn-transmitir:disabled{opacity:.4;cursor:not-allowed;transform:none}

#btn-wa{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:14px 18px;border-radius:14px;border:none;cursor:pointer;
  font-size:12px;font-weight:700;font-family:'Syne',sans-serif;
  background:#25d366;color:#fff;
  transition:all .2s;
  opacity:.35;pointer-events:none;
}
#btn-wa.ready{opacity:1;pointer-events:all}
#btn-wa:hover{background:#1db954;transform:translateY(-1px)}
#btn-wa:active{transform:scale(.98)}

/* TOAST */
#toast{
  position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-8px);
  background:#c8f03a;color:#1a2600;
  font-size:12px;font-weight:700;font-family:'Syne',sans-serif;
  padding:9px 20px;border-radius:99px;
  z-index:300;display:none;white-space:nowrap;
  box-shadow:0 4px 24px rgba(200,240,58,.35);
  letter-spacing:.02em;
}
#toast.show{display:block;animation:toast-in .2s ease}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(-8px)}}

/* MODAL */
#modal-overlay{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.88);
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(10px);
}
#modal-overlay.hidden{display:none}
#modal-box{
  background:#111;
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px 24px 0 0;
  padding:32px 24px 40px;
  width:100%;max-width:480px;
  text-align:center;
  animation:slide-up .3s cubic-bezier(.16,1,.3,1);
}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal-box h2{
  font-family:'Syne',sans-serif;
  font-size:22px;font-weight:800;color:#fff;
  margin-bottom:10px;letter-spacing:-.01em;
}
#modal-box p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:24px}
#modal-url-input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(200,240,58,.25);
  border-radius:12px;color:#c8f03a;
  font-size:13px;font-family:'DM Mono',monospace;
  outline:none;margin-bottom:14px;text-align:center;
  transition:border-color .2s;
}
#modal-url-input:focus{border-color:rgba(200,240,58,.6)}
#modal-url-input::placeholder{color:rgba(255,255,255,.2)}
#btn-modal-ok{
  width:100%;padding:15px;
  background:#c8f03a;color:#1a2600;
  border:none;border-radius:14px;
  font-family:'Syne',sans-serif;
  font-size:15px;font-weight:800;
  cursor:pointer;letter-spacing:.02em;
  transition:all .2s;
}
#btn-modal-ok:hover{background:#d4f85e;transform:translateY(-1px)}
#btn-modal-ok:active{transform:scale(.98)}

/* PREVIEW PESTAÑA HINT */
#tab-hint{
  display:none;
  align-items:center;gap:6px;
  padding:7px 12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;
  font-size:11px;color:rgba(255,255,255,.4);
  text-align:center;justify-content:center;
}
#tab-hint.on{display:flex}

/* ── TOGGLE HUD BUTTON ── */
#btn-toggle-hud{
  position:fixed;bottom:0;right:16px;z-index:200;
  width:36px;height:36px;border-radius:50% 50% 0 0;
  background:rgba(200,240,58,.12);
  border:1px solid rgba(200,240,58,.25);
  border-bottom:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .2s;
  font-size:15px;line-height:1;
}
#btn-toggle-hud:hover{background:rgba(200,240,58,.22)}

/* HUD oculto */
#hud.hidden{
  transform:translateY(calc(100% - 0px));
  opacity:0;
  pointer-events:none;
}
#hud{transition:transform .3s cubic-bezier(.16,1,.3,1), opacity .25s;}
</style>
</head>
<body>

<iframe id="tienda-frame" src="about:blank"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen></iframe>

<!-- TOP BAR -->
<div id="top-bar">
  <div id="logo">
    <div id="logo-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#c8f03a">
        <circle cx="12" cy="12" r="5"/>
        <path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="#c8f03a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    EASYLINK
  </div>
  <div id="live-badge">
    <div id="live-badge-dot"></div>
    EN VIVO
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="status-row">
    <div id="status-dot"></div>
    <span id="status-text">Iniciando...</span>
    <span id="viewers-pill">👁 <span id="viewers-count">0</span></span>
  </div>

  <div id="tab-hint">
    💡 Al compartir, selecciona <strong style="color:#c8f03a;margin:0 3px">Esta pestaña</strong> para transmitir solo la tienda
  </div>

  <div id="link-row">
    <span id="link-text"></span>
    <button id="btn-copy" onclick="copyLink()">Copiar</button>
  </div>

  <div id="btn-row">
    <button id="btn-transmitir" onclick="toggleStream()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="12" r="5"/>
        <path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      </svg>
      Transmitir
    </button>
    <button id="btn-wa" onclick="sendWhatsApp()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Enviar link
    </button>
  </div>
</div>

<div id="toast"></div>

<!-- TOGGLE HUD -->
<button id="btn-toggle-hud" onclick="toggleHud()" title="Ocultar / Mostrar panel">👁</button>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2>🛍 Demo en vivo</h2>
    <p>Pega la URL de tu tienda Easylink.<br>Se cargará aquí y podrás transmitir esta pestaña en vivo.</p>
    <input id="modal-url-input" type="url" placeholder="https://tu-tienda.github.io/?store=ID" autocomplete="off" spellcheck="false"/>
    <button id="btn-modal-ok" onclick="cargarTienda()">Cargar tienda →</button>
  </div>
</div>

<script>
var RECEPTOR_BASE = (function(){
  var base = location.href.replace(/transmisor\.html.*$/, '');
  return base + 'receptor.html';
})();

var peer, myPeerID, clientLink = '';
var connections = {};
var displayStream = null, isLive = false;
var tiendaURL = '';
var viewerCount = 0;

/* ── URL TIENDA DESDE PARAMS ── */
(function(){
  var p = new URLSearchParams(location.search);
  var u = p.get('url') || p.get('store') || localStorage.getItem('ld_demo_url') || '';
  if(u){ tiendaURL = u; cargarIframe(u); document.getElementById('modal-overlay').classList.add('hidden'); }
})();

function cargarTienda(){
  var v = document.getElementById('modal-url-input').value.trim();
  if(!v){ showToast('Pega la URL de tu tienda'); return; }
  if(!/^https?:\/\//.test(v)){ showToast('URL debe empezar con https://'); return; }
  tiendaURL = v;
  localStorage.setItem('ld_demo_url', v);
  cargarIframe(v);
  document.getElementById('modal-overlay').classList.add('hidden');
}

function cargarIframe(url){
  document.getElementById('tienda-frame').src = url;
}

/* ── STATUS ── */
function setStatus(txt, state){
  document.getElementById('status-text').textContent = txt;
  var dot = document.getElementById('status-dot');
  dot.className = '';
  if(state === 'live') dot.classList.add('live');
  else if(state === 'off') dot.classList.add('off');
}

/* ── PEERJS ── */
function initPeer(){
  setStatus('Conectando...', '');
  peer = new Peer({
    debug: 0,
    config:{
      iceServers:[
        {urls:'stun:stun.l.google.com:19302'},
        {urls:'stun:stun1.l.google.com:19302'},
        {urls:'turn:a.relay.metered.ca:80', username:'open', credential:'open'},
        {urls:'turn:a.relay.metered.ca:443', username:'open', credential:'open'},
        {urls:'turn:a.relay.metered.ca:443?transport=tcp', username:'open', credential:'open'}
      ],
      iceCandidatePoolSize: 10
    }
  });

  peer.on('open', function(id){
    myPeerID = id;
    clientLink = RECEPTOR_BASE + '?host=' + encodeURIComponent(id);
    if(tiendaURL) clientLink += '&url=' + encodeURIComponent(tiendaURL);
    setStatus('Listo para transmitir', '');
    document.getElementById('btn-transmitir').disabled = false;
    document.getElementById('link-text').textContent = clientLink;
    document.getElementById('link-row').classList.add('on');
    document.getElementById('btn-wa').classList.add('ready');
    document.getElementById('tab-hint').classList.add('on');
  });

  peer.on('connection', function(conn){
    conn.on('open', function(){
      connections[conn.peer] = conn;
      viewerCount = Object.keys(connections).length;
      updateViewers();
      if(isLive && displayStream) callViewer(conn.peer);
      conn.send({type:'store-url', url: tiendaURL});
    });
    conn.on('data', function(d){
      if(d && d.type === 'viewer-hello'){
        if(isLive && displayStream) callViewer(conn.peer);
      }
    });
    conn.on('close', function(){
      delete connections[conn.peer];
      viewerCount = Object.keys(connections).length;
      updateViewers();
    });
  });

  peer.on('error', function(e){
    console.warn('PeerJS error:', e);
    setStatus('Reconectando...', 'off');
    setTimeout(initPeer, 3000);
  });
}

function updateViewers(){
  var pill = document.getElementById('viewers-pill');
  document.getElementById('viewers-count').textContent = viewerCount;
  pill.classList.toggle('on', viewerCount > 0);
  if(isLive){
    setStatus(viewerCount > 0 ? viewerCount + ' viendo en vivo' : 'En vivo — esperando cliente', 'live');
  }
}

function callViewer(peerId){
  if(!displayStream) return;
  try{
    var call = peer.call(peerId, displayStream);
    call.on('error', function(e){ console.warn('call error:', e); });
  } catch(e){ console.warn(e); }
}

/* ── STREAM ── */
function toggleStream(){
  isLive ? stopStream() : startStream();
}

async function startStream(){
  if(!tiendaURL){ showToast('Primero carga la URL de la tienda'); return; }
  try {
    // Solicita captura de pestaña del navegador con preferencia a "browser tab"
    displayStream = await navigator.mediaDevices.getDisplayMedia({
      video:{
        displaySurface: 'browser',  // Sugiere "Esta pestaña" en el selector
        frameRate: { ideal: 30, max: 30 },
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        cursor: 'always'
      },
      audio: false,
      preferCurrentTab: true        // Chrome 107+: preselecciona la pestaña actual
    });

    isLive = true;
    displayStream.getVideoTracks()[0].addEventListener('ended', stopStream);

    var btn = document.getElementById('btn-transmitir');
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Detener';
    btn.classList.add('live');

    document.getElementById('live-badge').classList.add('on');
    document.getElementById('tab-hint').classList.remove('on');
    setStatus(viewerCount > 0 ? viewerCount + ' viendo en vivo' : 'En vivo — link listo', 'live');

    Object.keys(connections).forEach(function(pid){ callViewer(pid); });
    showToast('✓ Transmisión iniciada');
  } catch(e){
    console.warn(e);
    if(e.name === 'NotAllowedError'){
      showToast('Permite compartir pantalla para transmitir');
    } else {
      showToast('Error al capturar pantalla');
    }
    isLive = false; displayStream = null;
  }
}

function stopStream(){
  if(displayStream){
    displayStream.getTracks().forEach(function(t){ t.stop(); });
    displayStream = null;
  }
  isLive = false;
  var btn = document.getElementById('btn-transmitir');
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg> Transmitir';
  btn.classList.remove('live');
  document.getElementById('live-badge').classList.remove('on');
  document.getElementById('tab-hint').classList.add('on');
  setStatus('Transmisión detenida', 'off');
  showToast('Transmisión detenida');
}

/* ── WHATSAPP ── */
function sendWhatsApp(){
  if(!clientLink){ showToast('Espera a que se genere el link'); return; }
  var msg = '👀 *Mira mi tienda en vivo*\n\nAbre este link para ver la demo en tiempo real:\n' + clientLink;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

/* ── COPY ── */
function copyLink(){
  if(!clientLink) return;
  navigator.clipboard.writeText(clientLink).then(function(){
    showToast('✓ Link copiado');
  }).catch(function(){
    var ta = document.createElement('textarea');
    ta.value = clientLink; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✓ Link copiado');
  });
}

/* ── TOAST ── */
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className = ''; t.style.display = 'none'; t.style.display = ''; }, 2600);
}

/* ── ENTER EN INPUT ── */
document.getElementById('modal-url-input').addEventListener('keydown', function(e){
  if(e.key === 'Enter') cargarTienda();
});

/* ── TOGGLE HUD ── */
var hudVisible = true;
function toggleHud(){
  hudVisible = !hudVisible;
  var hud = document.getElementById('hud');
  var btn = document.getElementById('btn-toggle-hud');
  if(hudVisible){
    hud.classList.remove('hidden');
    btn.textContent = '👁';
    btn.title = 'Ocultar panel';
  } else {
    hud.classList.add('hidden');
    btn.textContent = '🙈';
    btn.title = 'Mostrar panel';
  }
}

/* ── INIT ── */
initPeer();
</script>
</body>
</html>
