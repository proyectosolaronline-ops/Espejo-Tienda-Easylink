<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Experience Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #a3e635; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; margin: 0; }
        #tienda-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; z-index: 1; background: #fff; }
        
        /* Miniatura con borde neón para asegurar que se vea */
        #video-container {
            position: absolute; top: 20px; right: 15px;
            width: 130px; height: 230px; border-radius: 12px;
            overflow: hidden; z-index: 100;
            border: 3px solid var(--primary); background: #222;
            display: none; transition: all 0.3s ease;
        }
        #video-container.maximized { top: 0; right: 0; width: 100%; height: 100%; border-radius: 0; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #btn-join {
            position: fixed; inset: 0; margin: auto; z-index: 200;
            width: 160px; height: 160px; border-radius: 50%;
            background: var(--primary); border: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="btn-join" onclick="startExperience()">CARGAR VIVO</button>
    <iframe id="tienda-iframe" src="about:blank"></iframe>

    <div id="video-container" onclick="this.classList.toggle('maximized')">
        <video id="remote-video" autoplay playsinline muted></video>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const hostId = params.get('host');
    const tiendaUrl = params.get('url');

    // Cargar tienda inmediatamente
    if(tiendaUrl) document.getElementById('tienda-iframe').src = tiendaUrl;

    function startExperience() {
        document.getElementById('btn-join').style.display = 'none';
        document.getElementById('video-container').style.display = 'block';

        const peer = new Peer({
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', () => {
            // Intentar conectar con el transmisor
            const conn = peer.connect(hostId);
            
            peer.on('call', (call) => {
                call.answer(); 
                call.on('stream', (stream) => {
                    const video = document.getElementById('remote-video');
                    video.srcObject = stream;
                    
                    // IMPORTANTE PARA CELULARES:
                    video.play().then(() => {
                        console.log("Video jugando");
                    }).catch(err => {
                        // Si falla, es por el audio. Quitamos mute al tocar
                        video.muted = true;
                        video.play();
                    });
                });
            });
        });
    }
</script>
</body>
</html>
