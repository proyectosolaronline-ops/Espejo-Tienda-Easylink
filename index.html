<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisor — Live Shopping Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #a3e635; --bg: #0f172a; --accent: #22c55e; }
        body { 
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh;
        }
        
        .card { 
            background: #1e293b; padding: 2.5rem; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; 
            width: 90%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); 
        }
        
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 16px; border-radius: 99px; background: rgba(0,0,0,0.3);
            margin-bottom: 20px; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
        }
        #status-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; }
        #status-dot.online { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        #btn-action { 
            background: var(--primary); color: #064e3b; border: none; 
            padding: 1.2rem 2rem; border-radius: 16px; font-weight: 900; 
            font-size: 1.1rem; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 100%; text-transform: uppercase;
        }
        
        #btn-action:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(163, 230, 53, 0.3); }
        #btn-action.live { background: #ef4444; color: white; }
        #btn-action:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        .link-box { 
            margin-top: 25px; background: rgba(163, 230, 53, 0.05); 
            border: 1px solid rgba(163, 230, 53, 0.2); border-radius: 12px; padding: 15px;
            display: none;
        }
        .url-text { 
            font-family: monospace; font-size: 0.8rem; color: var(--primary); 
            word-break: break-all; display: block; margin-bottom: 10px;
        }
        .copy-btn {
            background: var(--primary); color: #064e3b; border: none;
            padding: 5px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }
        #btn-paste {
    margin-top: 12px; width: 100%; padding: 0.8rem;
    background: transparent; border: 1px solid rgba(163,230,53,0.4);
    color: var(--primary); border-radius: 12px; font-size: 0.85rem;
    font-weight: 700; cursor: pointer; letter-spacing: 1px;
}
    </style>
</head>
<body>

    <div class="card">
        <div class="status-pill">
            <div id="status-dot"></div>
            <span id="status-text">CONECTANDO A PEERJS...</span>
        </div>

        <h2 style="margin: 0 0 10px 0;">Panel Transmisor</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">
            Transmite la pestaña de tu tienda a celulares en tiempo real.
        </p>

        <button id="btn-action" onclick="handleStream()" disabled>Espere...</button>
        <button id="btn-paste" onclick="pasteUrl()">📋 PEGAR LINK DE TIENDA</button>
        
        <div id="link-container" class="link-box">
            <span style="display:block; font-size: 0.7rem; color: #94a3b8; margin-bottom: 5px;">LINK PARA EL CLIENTE:</span>
            <span id="link-url" class="url-text"></span>
            <button class="copy-btn" onclick="copyUrl()">COPIAR LINK</button>
        </div>
    </div>

<script>
    // URL DE TU TIENDA (Inyectada directamente)
  let TIENDA_URL = "https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html?backend=https%3A%2F%2Fscript.google.com%2Fmacros%2Fs%2FAKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik%2Fexec&store=store_f2fcc889b992";
    
    // Nombre del archivo receptor que debes crear
    const RECEPTOR_FILE = "receptor.html"; 

    let peer, localStream, isLive = false;
    const connections = {};

    // UI Elements
    const btnAction = document.getElementById('btn-action');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const linkContainer = document.getElementById('link-container');
    const linkUrl = document.getElementById('link-url');

    // Inicializar PeerJS (PC)
    peer = new Peer({
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', (id) => {
        statusText.textContent = "SISTEMA LISTO";
        statusDot.className = "online";
        btnAction.disabled = false;
        btnAction.textContent = "Transmitir Tienda";
        
        // Generar enlace dinámico
        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
        const finalLink = `${baseUrl}${RECEPTOR_FILE}?host=${id}&url=${encodeURIComponent(TIENDA_URL)}`;
        linkUrl.textContent = finalLink;
        linkContainer.style.display = 'block';
    });

    peer.on('connection', (conn) => {
        connections[conn.peer] = conn;
        console.log("Cliente conectado:", conn.peer);
        if (isLive && localStream) {
            peer.call(conn.peer, localStream);
        }
    });

    async function handleStream() {
        if (isLive) {
            location.reload(); 
            return;
        }

        try {
            // CAPTURA DE VIDEO EN TIEMPO REAL (Pestaña)
            localStream = await navigator.mediaDevices.getDisplayMedia({
                video: { frameRate: { ideal: 15, max: 20 } },
                audio: false
            });

            isLive = true;
            btnAction.textContent = "Detener Vivo";
            btnAction.classList.add('live');
            statusText.textContent = "EN VIVO AHORA";

            // Llamar a todos los clientes que ya abrieron el link
            Object.keys(connections).forEach(peerId => {
                peer.call(peerId, localStream);
            });

            // Si cierras el compartido desde la barra de Chrome
            localStream.getVideoTracks()[0].onended = () => location.reload();

        } catch (err) {
            console.error(err);
            alert("Error: Debes seleccionar la pestaña de la tienda para transmitir.");
        }
    }

    function copyUrl() {
        navigator.clipboard.writeText(linkUrl.textContent);
        alert("¡Link copiado! Envíalo por WhatsApp a los celulares.");
    }

    async function pasteUrl() {
    try {
        const text = await navigator.clipboard.readText();
        if (text.startsWith("http")) {
            TIENDA_URL = text.trim();
            const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
            const finalLink = `${baseUrl}${RECEPTOR_FILE}?host=${peer.id}&url=${encodeURIComponent(TIENDA_URL)}`;
            linkUrl.textContent = finalLink;
            alert("✅ Link actualizado.");
        } else {
            alert("⚠️ El texto copiado no es un link válido.");
        }
    } catch (err) {
        alert("❌ Permite el acceso al portapapeles en el navegador.");
    }
}
</script>
</body>
</html>
