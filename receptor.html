<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Easylink — En Vivo</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --lime:#c8f03a;--lime-dim:rgba(200,240,58,.12);--lime-border:rgba(200,240,58,.28);
  --red:#ef4444;--green:#22c55e;--amber:#f59e0b;
  --bg:#0a0a0a;--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.09);
  --text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.45);--hint:rgba(255,255,255,.2);
  --r:14px;--rSm:10px;--rPill:99px;
  --safe:env(safe-area-inset-bottom,0px);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'DM Sans',system-ui,sans-serif;color:var(--text);}

#app{display:flex;flex-direction:column;height:100%;}

/* STREAM ZONE */
#stream-zone{flex:1;position:relative;overflow:hidden;background:#050505;}

#store-frame{
  position:absolute;inset:0;width:100%;height:100%;border:none;
  opacity:0;transition:opacity .5s;
  pointer-events:none; /* receptor solo ve, no interactúa */
}
#store-frame.ready{opacity:1;}

/* WAITING SCREEN */
#waiting{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:var(--bg);
}
#waiting-anim{
  width:56px;height:56px;border-radius:50%;
  border:2px solid var(--border);
  border-top-color:var(--lime);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#waiting h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--muted);}
#waiting p{font-size:11px;color:var(--hint);text-align:center;max-width:200px;line-height:1.7;}

/* OFFLINE SCREEN */
#offline{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  background:var(--bg);
}
#offline.on{display:flex;}
#offline h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--muted);}
#offline p{font-size:11px;color:var(--hint);text-align:center;max-width:200px;line-height:1.7;}
#offline svg{opacity:.2;}

/* LIVE BADGE */
#badge-live{
  position:absolute;top:10px;right:10px;z-index:20;
  display:none;align-items:center;gap:4px;
  background:rgba(0,0,0,.8);
  border:1px solid rgba(239,68,68,.4);
  padding:4px 9px;border-radius:var(--rPill);
  font-size:9px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.06em;color:#f87171;
}
#badge-live.on{display:flex;}
#live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* PAUSED BANNER */
#paused-banner{
  position:absolute;inset:0;z-index:15;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.65);
}
#paused-banner.on{display:flex;}
#paused-pill{
  display:flex;align-items:center;gap:8px;
  background:rgba(15,15,15,.95);
  border:1px solid var(--border);
  padding:12px 20px;border-radius:var(--r);
  font-family:'Syne',sans-serif;font-size:12px;font-weight:800;
  color:var(--muted);letter-spacing:.05em;
}

/* CLICK RIPPLE */
.ripple{
  position:absolute;pointer-events:none;z-index:18;
  width:36px;height:36px;margin:-18px 0 0 -18px;
  border-radius:50%;background:rgba(200,240,58,.35);
  animation:rout .6s ease-out forwards;
}
@keyframes rout{0%{transform:scale(0);opacity:1}100%{transform:scale(2.5);opacity:0}}

/* SCROLL INDICATOR */
#scroll-track{
  position:absolute;right:3px;top:0;bottom:0;width:3px;z-index:20;
  pointer-events:none;
}
#scroll-thumb{
  width:3px;border-radius:2px;background:rgba(200,240,58,.4);
  position:absolute;right:0;min-height:40px;
  transition:top .15s ease-out;
}

/* HUD */
#hud{
  flex-shrink:0;background:var(--bg);
  padding:12px 14px calc(12px + var(--safe));
  display:flex;flex-direction:column;gap:9px;
  border-top:1px solid var(--border);
}

#hud-header{display:flex;align-items:center;justify-content:space-between;}
#logo{
  display:flex;align-items:center;gap:6px;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:800;
  color:var(--lime);letter-spacing:.1em;
}
#logo-icon{
  width:24px;height:24px;border-radius:7px;
  background:var(--lime-dim);border:1px solid var(--lime-border);
  display:flex;align-items:center;justify-content:center;
}
#status-pill{
  display:flex;align-items:center;gap:4px;
  background:var(--surface);border:1px solid var(--border);
  padding:4px 9px;border-radius:var(--rPill);
  font-size:9px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.04em;
  color:var(--muted);transition:all .3s;
}
#sdot{width:5px;height:5px;border-radius:50%;background:var(--muted);transition:background .3s;}
#sdot.live{background:var(--green);animation:pulse 1.5s infinite;}
#sdot.off{background:var(--red);}
#sdot.wait{background:var(--amber);animation:pulse-amber 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}
@keyframes pulse-amber{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 5px rgba(245,158,11,0)}}

/* INFO ROW */
#info-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rSm);
  font-size:11px;color:var(--muted);
}
#info-row svg{flex-shrink:0;color:var(--hint);}
#info-text{flex:1;font-size:10px;color:var(--hint);}
#info-text strong{color:var(--muted);}

/* BTN ROW */
#btn-row{display:flex;gap:8px;}
#btn-fs{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:13px;border:1px solid var(--border);border-radius:var(--r);
  background:var(--surface);
  font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:.03em;
  color:var(--text);cursor:pointer;transition:all .2s;
}
#btn-fs:active{transform:scale(.97);}
#btn-wa{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:13px 16px;border:none;border-radius:var(--r);
  background:#25d366;color:#fff;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:800;
  transition:all .2s;
}
#btn-wa:active{transform:scale(.97);}

/* TOAST */
#toast{
  position:fixed;top:14px;left:50%;
  transform:translateX(-50%);
  background:var(--lime);color:#1a2600;
  font-size:11px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.03em;
  padding:8px 18px;border-radius:var(--rPill);
  z-index:999;display:none;white-space:nowrap;
}
#toast.show{display:block;animation:tin .2s ease;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* FULLSCREEN MODE */
body.fs #hud{display:none;}
body.fs #stream-zone{flex:1;}
#btn-exit-fs{
  position:fixed;bottom:20px;right:16px;z-index:500;
  display:none;
  background:rgba(10,10,10,.95);border:1px solid var(--lime-border);
  border-radius:20px;padding:8px 14px;
  color:var(--lime);font-size:10px;font-weight:700;
  font-family:'Syne',sans-serif;letter-spacing:.05em;cursor:pointer;
  align-items:center;gap:5px;
}
body.fs #btn-exit-fs{display:flex;}
</style>
</head>
<body>

<div id="app">
  <div id="stream-zone">

    <!-- IFRAME TIENDA -->
    <iframe id="store-frame" src="about:blank"
      allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
      allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"></iframe>

    <!-- WAITING -->
    <div id="waiting">
      <div id="waiting-anim"></div>
      <h2>Conectando...</h2>
      <p>Esperando que el vendedor inicie el mirror en vivo.</p>
    </div>

    <!-- OFFLINE -->
    <div id="offline">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"/>
      </svg>
      <h2>Sin conexión</h2>
      <p>El vendedor no está transmitiendo en este momento.</p>
    </div>

    <!-- LIVE BADGE -->
    <div id="badge-live"><div id="live-dot"></div>EN VIVO</div>

    <!-- PAUSED -->
    <div id="paused-banner">
      <div id="paused-pill">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Mirror pausado
      </div>
    </div>

    <!-- SCROLL INDICATOR -->
    <div id="scroll-track"><div id="scroll-thumb"></div></div>

  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-header">
      <div id="logo">
        <div id="logo-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#c8f03a">
            <circle cx="12" cy="12" r="4.5"/>
            <path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="#c8f03a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        EASYLINK
      </div>
      <div id="status-pill"><div id="sdot" class="wait"></div><span id="stext">Conectando...</span></div>
    </div>

    <div id="info-row">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      <span id="info-text">Esperando transmisión del vendedor...</span>
    </div>

    <div id="btn-row">
      <button id="btn-fs" onclick="toggleFS()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
        Pantalla completa
      </button>
      <button id="btn-wa" onclick="shareLink()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Compartir
      </button>
    </div>
  </div>
</div>

<button id="btn-exit-fs" onclick="toggleFS()">
  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M8 3v3a2 2 0 01-2 2H3m18 0h-3a2 2 0 01-2-2V3m0 18v-3a2 2 0 012-2h3M3 16h3a2 2 0 012 2v3"/></svg>
  Salir
</button>

<div id="toast"></div>

<script>
/* ── PARAMS ── */
var params = new URLSearchParams(location.search);
var HOST_ID  = params.get('host') || '';
var STORE_URL = params.get('url')  || '';

/* ── STATE ── */
var peer, conn;
var isConnected = false;
var isLive = false;
var storeLoaded = false;
var currentScrollRatio = 0;

/* ── INIT ── */
(function(){
  if(!HOST_ID){
    setStatus('Sin host','off');
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('offline').classList.add('on');
    return;
  }
  if(STORE_URL) loadStore(STORE_URL);
  initPeer();
})();

/* ── LOAD STORE ── */
function loadStore(url){
  if(!url) return;
  STORE_URL = url;
  var f = document.getElementById('store-frame');
  f.src = url;
  f.onload = function(){
    storeLoaded = true;
    f.classList.add('ready');
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('info-text').innerHTML = 'Tienda cargada — <strong>mirror activo</strong>';
  };
}

/* ── PEER ── */
function initPeer(){
  setStatus('Conectando...','wait');
  peer = new Peer({debug:0, config:{
    iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'turn:a.relay.metered.ca:80',username:'open',credential:'open'},
      {urls:'turn:a.relay.metered.ca:443',username:'open',credential:'open'},
      {urls:'turn:a.relay.metered.ca:443?transport=tcp',username:'open',credential:'open'}
    ],
    iceCandidatePoolSize:10
  }});

  peer.on('open', function(){
    connectToHost();
  });

  peer.on('error', function(e){
    setStatus('Error','off');
    setTimeout(function(){ try{peer.destroy();}catch(x){} initPeer(); }, 3000);
  });
}

function connectToHost(){
  setStatus('Buscando vendedor...','wait');
  conn = peer.connect(HOST_ID, {reliable:true, serialization:'json'});

  conn.on('open', function(){
    isConnected = true;
    setStatus('Conectado','live');
    document.getElementById('offline').classList.remove('on');
    document.getElementById('info-text').innerHTML = 'Conectado al vendedor — <strong>en vivo</strong>';
    toast('✓ Conectado');
  });

  conn.on('data', function(msg){
    handleMsg(msg);
  });

  conn.on('close', function(){
    isConnected = false;
    isLive = false;
    setStatus('Desconectado','off');
    document.getElementById('badge-live').classList.remove('on');
    document.getElementById('paused-banner').classList.remove('on');
    document.getElementById('offline').classList.add('on');
    document.getElementById('info-text').innerHTML = 'Vendedor desconectado';
    // Reintentar
    setTimeout(connectToHost, 4000);
  });

  conn.on('error', function(){
    isConnected = false;
    setStatus('Error de conexión','off');
    setTimeout(connectToHost, 4000);
  });
}

/* ── HANDLE MESSAGES ── */
function handleMsg(msg){
  if(!msg || !msg.type) return;

  switch(msg.type){

    case 'store-url':
      if(msg.url && msg.url !== STORE_URL) loadStore(msg.url);
      break;

    case 'sync-state':
      isLive = msg.isLive;
      document.getElementById('badge-live').classList.toggle('on', isLive);
      document.getElementById('paused-banner').classList.toggle('on', !isLive && storeLoaded);
      if(isLive){
        setStatus('En vivo','live');
        if(msg.scrollRatio !== undefined) applyScroll(msg.scrollRatio);
      } else {
        setStatus('Pausado','off');
      }
      break;

    case 'scroll':
      if(isLive) applyScroll(msg.ratio, msg.scrollY);
      break;

    case 'click':
      if(isLive) applyClick(msg.rx, msg.ry);
      break;
  }
}

/* ── APPLY SCROLL ── */
function applyScroll(ratio, absScrollY){
  currentScrollRatio = ratio;

  // Actualizar scroll thumb
  var track = document.getElementById('scroll-track');
  var thumb = document.getElementById('scroll-thumb');
  var trackH = track.clientHeight;
  var thumbH = Math.max(40, trackH * 0.15);
  thumb.style.height = thumbH + 'px';
  thumb.style.top = (ratio * (trackH - thumbH)) + 'px';

  // Aplicar scroll en el iframe
  var f = document.getElementById('store-frame');
  try{
    var fw = f.contentWindow;
    if(absScrollY !== undefined){
      fw.scrollTo({top: absScrollY, behavior:'smooth'});
    } else {
      var maxScroll = fw.document.documentElement.scrollHeight - fw.innerHeight;
      fw.scrollTo({top: ratio * maxScroll, behavior:'smooth'});
    }
  }catch(x){
    // cross-origin fallback: usar scrollTop del propio iframe
    f.style.transform = 'translateY(-' + (ratio * 30) + '%)';
  }
}

/* ── APPLY CLICK ── */
function applyClick(rx, ry){
  var zone = document.getElementById('stream-zone');
  var x = rx * zone.clientWidth;
  var y = ry * zone.clientHeight;
  spawnRipple(x, y);

  // Intentar click real en iframe
  var f = document.getElementById('store-frame');
  try{
    var fw = f.contentWindow;
    var absX = rx * fw.innerWidth;
    var absY = ry * fw.innerHeight + fw.scrollY;
    var el = fw.document.elementFromPoint(absX, ry * fw.innerHeight);
    if(el) el.click();
  }catch(x){}
}

/* ── RIPPLE ── */
function spawnRipple(x, y){
  var zone = document.getElementById('stream-zone');
  var r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top  = y + 'px';
  zone.appendChild(r);
  setTimeout(function(){ r.remove(); }, 650);
}

/* ── UI ── */
function setStatus(txt, state){
  document.getElementById('stext').textContent = txt;
  var d = document.getElementById('sdot');
  d.className = state;
}

function toggleFS(){
  document.body.classList.toggle('fs');
}

function shareLink(){
  var url = location.href;
  if(navigator.share){
    navigator.share({title:'Ver tienda en vivo', url:url});
  } else {
    navigator.clipboard.writeText(url).then(function(){ toast('✓ Link copiado'); });
  }
}

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className=''; }, 2500);
}
</script>
</body>
</html>
