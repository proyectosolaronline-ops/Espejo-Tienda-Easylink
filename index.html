<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>EasyLink</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;position:fixed;font-family:-apple-system,BlinkMacSystemFont,sans-serif}

/* ═══ TRANSMISOR ═══ */
#transmisor{width:100%;height:100%;display:flex;flex-direction:column;background:#0a0a0a}
#transmisor .tb{background:#111;padding:8px 12px;padding-top:max(8px,env(safe-area-inset-top));display:flex;align-items:center;gap:8px;flex-shrink:0}
#transmisor .dot{width:8px;height:8px;border-radius:50%;background:#fbbf24;flex-shrink:0;animation:pulse 1.2s infinite}
#transmisor .dot.live{background:#4ade80;animation:none}
#transmisor .dot.off{background:#ef4444;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
#transmisor .tl{color:#fff;font-size:11px;font-weight:600;flex:1}
#transmisor .ti{color:#4ade80;font-family:monospace;font-size:11px;background:#1a1a1a;padding:4px 10px;border-radius:8px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#transmisor .ct{flex:1;display:flex;flex-direction:column;min-height:0}
#transmisor .pv{background:#000;display:none;position:relative;border-bottom:2px solid #4ade80}
#transmisor .pv.on{display:flex;height:35%}
#transmisor .pv video{width:100%;height:100%;object-fit:contain}
#transmisor .pt{position:absolute;top:6px;left:8px;background:rgba(0,0,0,.8);color:#4ade80;font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;z-index:5}
#transmisor .st{flex:1;background:#fff;min-height:0}
#transmisor .st.sm{flex:none;height:65%}
#transmisor .st iframe{width:100%;height:100%;border:none}
#transmisor .bb{background:#111;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:8px;flex-shrink:0}
#transmisor .btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
#transmisor .btn:active{transform:scale(.96)}#transmisor .btn:disabled{opacity:.35;pointer-events:none}
#transmisor .btn-go{background:#4ade80;color:#000}#transmisor .btn-go.stop{background:#ef4444;color:#fff}
#transmisor .btn-sh{background:#1a1a1a;color:#fff;border:1px solid rgba(255,255,255,.1)}

/* ═══ RECEPTOR ═══ */
#receptor{width:100%;height:100%;display:none;flex-direction:column;background:#000}
#receptor .vz{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:#000}
#receptor .vz video{width:100%;height:100%;object-fit:contain}
#receptor .sp{position:absolute;top:10px;top:max(10px,env(safe-area-inset-top));left:10px;background:rgba(0,0,0,.7);color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;z-index:10;border:1px solid rgba(255,255,255,.1)}
#receptor .sd{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
#receptor .sd.w{background:#fbbf24;animation:blink 1.2s infinite}
#receptor .sd.o{background:#ef4444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#receptor .btns{position:absolute;bottom:16px;bottom:max(16px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
#receptor .b{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.7);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
#receptor .b:active{transform:scale(.9);background:rgba(255,255,255,.2)}

/* ═══ SHARED ═══ */
.shol{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:200;align-items:center;justify-content:center;padding:20px}
.shol.open{display:flex}
.sbox{background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px;text-align:center;width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px}
.sbox h3{color:#fff;font-size:16px}
.scode{font-family:monospace;font-size:24px;font-weight:800;color:#4ade80;letter-spacing:2px;background:#0a0a0a;padding:10px;border-radius:8px;word-break:break-all}
.slink{font-size:10px;color:rgba(255,255,255,.4);background:#0a0a0a;padding:8px;border-radius:6px;font-family:monospace;word-break:break-all}
.btn-cp{width:100%;padding:12px;background:#4ade80;color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-cl{width:100%;padding:10px;background:transparent;color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:10px;font-size:13px;cursor:pointer}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(0,0,0,.92);color:#fff;padding:12px 20px;border-radius:14px;font-size:12px;font-weight:600;z-index:300;opacity:0;pointer-events:none;transition:all .2s;text-align:center;border:1px solid rgba(255,255,255,.1);white-space:nowrap}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.ld{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:14px}
.ld.h{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lm{color:#fff;font-size:13px;text-align:center;padding:0 20px}
.toe{position:absolute;bottom:90px;left:16px;right:16px;background:rgba(239,68,68,.9);color:#fff;padding:12px;border-radius:12px;font-size:12px;text-align:center;z-index:30;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toe.s{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<!-- ═══ TRANSMISOR ═══ -->
<div id="transmisor">
  <div class="tb">
    <span class="dot" id="dot"></span>
    <span class="tl" id="tl">Iniciando...</span>
    <span class="ti" id="ti">---</span>
  </div>
  <div class="ct">
    <div class="pv" id="pv">
      <div class="pt">📡 Receptor ve esto</div>
      <video id="pvVideo" autoplay playsinline muted></video>
    </div>
    <div class="st" id="stBox">
      <iframe id="stFrame" src="tienda.html" allowfullscreen></iframe>
    </div>
  </div>
  <div class="bb">
    <button class="btn btn-go" id="btnGo" disabled>📺 Iniciar transmisión</button>
    <button class="btn btn-sh" id="btnSh" disabled>🔗 Compartir</button>
  </div>
</div>

<!-- ═══ RECEPTOR ═══ -->
<div id="receptor">
  <div class="vz">
    <video id="rv" autoplay playsinline muted></video>
    <div class="sp" id="sp" style="display:none"><span class="sd w" id="sd"></span><span id="sl">Conectando</span></div>
    <div class="btns" id="bt" style="display:none">
      <button class="b" id="bfs">⛶</button>
      <button class="b" id="brc">🔄</button>
    </div>
    <div class="ld" id="ld"><div class="spinner"></div><div class="lm" id="lmt">📡 Buscando transmisor...</div><div class="lm" id="lms" style="font-size:10px;color:rgba(255,255,255,.4);font-family:monospace"></div></div>
    <div class="toe" id="te"></div>
  </div>
</div>

<!-- ═══ SHARE OVERLAY ═══ -->
<div class="shol" id="shol">
  <div class="sbox">
    <h3>📡 Compartir transmisión</h3>
    <div style="color:rgba(255,255,255,.5);font-size:11px">ID para receptor:</div>
    <div class="scode" id="scode">---</div>
    <div class="slink" id="slink"></div>
    <button class="btn-cp" id="btnCpLink">📋 Copiar enlace</button>
    <button class="btn-cp" id="btnCpId" style="background:#1a1a1a;color:#4ade80;border:1px solid #4ade80">📋 Copiar solo ID</button>
    <button class="btn-cl" id="btnCl">Cerrar</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  const isReceiver = window.location.search.includes('host=');
  const hostId = new URLSearchParams(window.location.search).get('host');

  // ═══ TOAST ═══
  const toast=document.getElementById('toast');let tt;
  function showT(m){toast.textContent=m;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),1800)}

  if (isReceiver && hostId) {
    // ═══ RECEPTOR ═══
    document.getElementById('transmisor').style.display='none';
    document.getElementById('receptor').style.display='flex';
    const rv=document.getElementById('rv'),sp=document.getElementById('sp'),sd=document.getElementById('sd'),sl=document.getElementById('sl'),bt=document.getElementById('bt'),te=document.getElementById('te'),ld=document.getElementById('ld'),lmt=document.getElementById('lmt'),lms=document.getElementById('lms');
    let p=null,c=null,et;

    function err(m){te.textContent=m;te.classList.add('s');clearTimeout(et);et=setTimeout(()=>te.classList.remove('s'),3500)}
    function ss(s,l){sp.style.display='flex';sd.className='sd '+s;sl.textContent=l}
    function slo(m,s){lmt.textContent=m;lms.textContent=s||'';ld.classList.remove('h')}
    function hld(){ld.classList.add('h')}

    document.getElementById('bfs').onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>rv.requestFullscreen().catch(()=>{}));else document.exitFullscreen()};
    document.getElementById('brc').onclick=()=>{if(c){c.close();c=null}if(p){p.destroy();p=null}rv.srcObject=null;bt.style.display='none';ss('w','Reconectando');slo('🔄 Reconectando...',hostId.slice(0,16)+'...');setTimeout(con,500)};

    function con(){
      bt.style.display='flex';ss('w','Conectando');slo('📡 Buscando...',hostId.slice(0,16)+'...');
      p=new Peer({debug:0,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'},{urls:['turn:a.relay.metered.ca:80','turn:a.relay.metered.ca:443','turn:a.relay.metered.ca:443?transport=tcp'],username:'open',credential:'open'}],iceCandidatePoolSize:8}});
      p.on('open',()=>{slo('📞 Llamando...',hostId.slice(0,16)+'...');const d=p.connect(hostId,{reliable:true});d.on('open',()=>{slo('📡 Esperando video...','');d.send({type:'viewer-hello',name:'Receptor'})});d.on('error',()=>{err('No se pudo contactar');ss('o','Offline');slo('⚠️ Host offline','')})});
      p.on('call',call=>{c=call;call.answer();slo('🎬 Cargando...','');call.on('stream',s=>{hld();bt.style.display='flex';ss('','EN VIVO');rv.srcObject=s;rv.play().catch(()=>err('Toca para reproducir'))});call.on('error',()=>{err('Error video');hld();ss('o','Error')});call.on('close',()=>{rv.srcObject=null;ss('o','Finalizado');slo('⏹ Terminado','');bt.style.display='flex'})});
      p.on('error',e=>{hld();ss('o','Error');err(e.type==='peer-unavailable'?'Host no encontrado':'Error: '+(e.message||e.type));slo('❌ Error','')});
      p.on('disconnected',()=>{ss('o','Desconectado');err('Conexión perdida');setTimeout(()=>{if(p&&!p.destroyed)p.reconnect()},2000)});
    }
    window.addEventListener('beforeunload',()=>{if(c)c.close();if(p)p.destroy()});
    con();

  } else {
    // ═══ TRANSMISOR ═══
    const dot=document.getElementById('dot'),tl=document.getElementById('tl'),ti=document.getElementById('ti'),btnGo=document.getElementById('btnGo'),btnSh=document.getElementById('btnSh'),pv=document.getElementById('pv'),pvVideo=document.getElementById('pvVideo'),stBox=document.getElementById('stBox'),shol=document.getElementById('shol'),scode=document.getElementById('scode'),slink=document.getElementById('slink');
    let peer=null,peerId=null,stream=null,active=false;

    function st(s,l){dot.className='dot '+s;tl.textContent=l}

    peer=new Peer({debug:0,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'},{urls:['turn:a.relay.metered.ca:80','turn:a.relay.metered.ca:443','turn:a.relay.metered.ca:443?transport=tcp'],username:'open',credential:'open'}],iceCandidatePoolSize:8}});
    peer.on('open',id=>{peerId=id;ti.textContent=id;st('off','Listo');btnGo.disabled=false;btnSh.disabled=false});
    peer.on('error',()=>{st('off','Error');showT('Error conexión')});
    peer.on('call',call=>{if(stream)call.answer(stream);else call.close()});

    btnGo.onclick=async()=>{
      if(active){
        if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
        active=false;pvVideo.srcObject=null;pv.classList.remove('on');stBox.classList.remove('sm');st('off','Listo');btnGo.textContent='📺 Iniciar transmisión';btnGo.classList.remove('stop');showT('Detenido');return;
      }
      try{
        stream=await navigator.mediaDevices.getDisplayMedia({video:{mediaSource:'screen'},audio:true});
        active=true;pvVideo.srcObject=stream;pv.classList.add('on');stBox.classList.add('sm');st('live','Transmitiendo');btnGo.textContent='⏹ Detener';btnGo.classList.add('stop');showT('✅ Transmitiendo');
        stream.getVideoTracks()[0].addEventListener('ended',()=>btnGo.click());
      }catch(e){showT('Permiso denegado')}
    };

    btnSh.onclick=()=>{
      if(!peerId)return;
      const url=window.location.origin+window.location.pathname+'?host='+peerId;
      scode.textContent=peerId;slink.textContent=url;shol.classList.add('open');
    };
    document.getElementById('btnCl').onclick=()=>shol.classList.remove('open');
    document.getElementById('btnCpLink').onclick=()=>{navigator.clipboard.writeText(slink.textContent).then(()=>{showT('✅ Enlace copiado');shol.classList.remove('open')})};
    document.getElementById('btnCpId').onclick=()=>{navigator.clipboard.writeText(peerId).then(()=>{showT('✅ ID copiado');shol.classList.remove('open')})};

    window.addEventListener('beforeunload',()=>{if(stream)stream.getTracks().forEach(t=>t.stop());if(peer)peer.destroy()});
  }
})();
</script>
</body>
</html>
