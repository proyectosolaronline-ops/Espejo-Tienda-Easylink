<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Transmisor — Easylink Demo</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js">
</script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000;
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  color:#fff;
  -webkit-tap-highlight-color:transparent;
}
#app{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  background:radial-gradient(ellipse at 50% 30%,#111800 0%,#0a0a0a 70%);
  position:relative;
}
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:rgba(0,0,0,.9);
  z-index:100;
  flex-shrink:0;
}
#logo{
  display:flex;align-items:center;gap:8px;
  font-family:'Syne',sans-serif;
  font-size:13px;font-weight:800;
  color:#c8f03a;letter-spacing:.08em;
  text-transform:uppercase;
}
#logo-icon{
  width:28px;height:28px;border-radius:8px;
  background:rgba(200,240,58,.12);
  border:1px solid rgba(200,240,58,.25);
  display:flex;align-items:center;justify-content:center;
}
#live-badge{
  display:none;align-items:center;gap:5px;
  background:rgba(239,68,68,.15);
  border:1px solid rgba(239,68,68,.4);
  padding:4px 11px;border-radius:99px;
  font-size:10px;font-weight:700;color:#f87171;
  letter-spacing:.08em;text-transform:uppercase;
}
#live-badge.on{display:flex}
#live-badge-dot{
  width:5px;height:5px;border-radius:50%;
  background:#ef4444;animation:blink 1s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

#phone-container{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:12px;
  min-height:0;
}
#phone{
  width:100%;
  height:100%;
  max-width:400px;
  border-radius:36px;
  background:#000;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.1),
    0 0 0 8px #111,
    0 0 0 9px rgba(255,255,255,.08),
    0 20px 60px rgba(0,0,0,.9);
  overflow:hidden;
  position:relative;
}
#notch{
  position:absolute;
  top:10px;left:50%;transform:translateX(-50%);
  width:100px;height:28px;
  background:#000;border-radius:16px;
  z-index:10;pointer-events:none;
}
#store-frame{
  width:100%;height:100%;
  border:none;background:#fff;
}

#hud{
  flex-shrink:0;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
  background:rgba(0,0,0,.95);
  display:flex;flex-direction:column;
  gap:8px;
  transition:transform .3s, opacity .3s;
}
#hud.hidden{
  transform:translateY(100%);
  opacity:0;
  pointer-events:none;
}
.hud-row{
  display:flex;align-items:center;
  gap:8px;
  padding:8px 12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
}
#status-dot{
  width:8px;height:8px;border-radius:50%;
  background:#f59e0b;flex-shrink:0;
}
#status-dot.live{background:#22c55e;animation:pulse-green 1.5s infinite}
#status-dot.off{background:#ef4444}
@keyframes pulse-green{
  0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}
  50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}
}
#status-text{
  font-size:12px;font-weight:500;
  color:rgba(255,255,255,.7);flex:1;
}
#viewers-badge{
  display:none;align-items:center;gap:4px;
  background:rgba(200,240,58,.1);
  border:1px solid rgba(200,240,58,.25);
  padding:3px 9px;border-radius:99px;
  font-size:10px;font-weight:700;color:#c8f03a;
}
#viewers-badge.show{display:flex}

#link-row{
  display:none;align-items:center;gap:8px;
  padding:8px 12px;
  background:rgba(200,240,58,.05);
  border:1px solid rgba(200,240,58,.2);
  border-radius:12px;
}
#link-row.show{display:flex}
#link-url{
  flex:1;font-size:10px;color:#c8f03a;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:monospace;
}
#copy-btn{
  background:rgba(200,240,58,.12);
  border:1px solid rgba(200,240,58,.3);
  color:#c8f03a;font-size:10px;font-weight:700;
  padding:5px 12px;border-radius:8px;cursor:pointer;
  white-space:nowrap;
}
#copy-btn:active{background:rgba(200,240,58,.2)}

#buttons-row{
  display:flex;gap:8px;
}
#stream-btn{
  flex:1;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px;border-radius:14px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;font-family:'Syne',sans-serif;
  background:#c8f03a;color:#1a2600;
  transition:all .2s;
}
#stream-btn:active{transform:scale(.97)}
#stream-btn.live{background:#ef4444;color:#fff}
#stream-btn:disabled{opacity:.4;pointer-events:none}
#wa-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:14px 16px;border-radius:14px;border:none;cursor:pointer;
  font-size:12px;font-weight:700;font-family:'Syne',sans-serif;
  background:#25d366;color:#fff;
  opacity:.35;pointer-events:none;transition:all .2s;
}
#wa-btn.ready{opacity:1;pointer-events:all}
#wa-btn:active{transform:scale(.97)}

#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:#c8f03a;color:#1a2600;
  font-size:12px;font-weight:700;font-family:'Syne',sans-serif;
  padding:8px 18px;border-radius:99px;
  z-index:999;display:none;white-space:nowrap;
  box-shadow:0 4px 20px rgba(200,240,58,.4);
}
#toast.show{display:block}

#modal{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.9);
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(10px);
}
#modal.hidden{display:none}
#modal-box{
  background:#111;
  border:1px solid rgba(255,255,255,.1);
  border-radius:24px 24px 0 0;
  padding:32px 24px 40px;
  width:100%;max-width:450px;
  text-align:center;
}
#modal-box h2{
  font-family:'Syne',sans-serif;
  font-size:20px;font-weight:800;margin-bottom:8px;
}
#modal-box p{
  font-size:13px;color:rgba(255,255,255,.4);
  margin-bottom:20px;line-height:1.6;
}
#url-input{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(200,240,58,.25);
  border-radius:12px;color:#c8f03a;
  font-size:13px;font-family:monospace;
  outline:none;margin-bottom:12px;
  text-align:center;
}
#url-input:focus{border-color:#c8f03a}
#load-btn{
  width:100%;padding:14px;
  background:#c8f03a;color:#1a2600;
  border:none;border-radius:14px;
  font-family:'Syne',sans-serif;
  font-size:15px;font-weight:800;
  cursor:pointer;
}
#load-btn:active{transform:scale(.97)}

#show-hud-btn{
  position:fixed;bottom:16px;right:16px;z-index:600;
  background:rgba(0,0,0,.9);
  border:1px solid rgba(200,240,58,.4);
  border-radius:16px;
  padding:8px 14px;
  color:#c8f03a;
  font-size:11px;font-weight:700;font-family:'Syne',sans-serif;
  cursor:pointer;
  display:none;align-items:center;gap:6px;
  box-shadow:0 2px 12px rgba(0,0,0,.6);
}
#show-hud-btn.visible{display:flex}
#show-hud-btn:active{transform:scale(.96)}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="logo">
      <div id="logo-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#c8f03a">
          <circle cx="12" cy="12" r="5"/>
          <path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="#c8f03a" stroke-width="1.8" fill="none"/>
        </svg>
      </div>
      EASYLINK
    </div>
    <div id="live-badge">
      <div id="live-badge-dot"></div>
      EN VIVO
    </div>
  </div>

  <div id="phone-container">
    <div id="phone">
      <div id="notch"></div>
      <iframe id="store-frame" src="about:blank" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
  </div>

  <div id="hud">
    <div class="hud-row">
      <div id="status-dot"></div>
      <span id="status-text">Iniciando...</span>
      <span id="viewers-badge">👁 <span id="viewers-count">0</span></span>
    </div>
    
    <div id="link-row">
      <span id="link-url"></span>
      <button id="copy-btn" onclick="copyLink()">Copiar</button>
    </div>
    
    <div id="buttons-row">
      <button id="stream-btn" onclick="toggleStream()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
        Transmitir
      </button>
      <button id="wa-btn" onclick="sendWhatsApp()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.3c-.3-.1-1.8-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8 1-.9 1.2-.2.2-.3.2-.6.1-.3-.1-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.2-.2.2-.3.3-.5.1-.2.1-.4 0-.5-.1-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5-.2 0-.4 0-.6 0-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.1.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.3-.7.3-1.3.2-1.4-.1-.1-.3-.2-.6-.3M12 21.8h0c-1.7 0-3.3-.5-4.7-1.3l-.4-.2-3.7 1 1-3.6-.2-.4c-.8-1.4-1.3-3-1.3-4.7C2.7 6.5 6.7 2.5 11.6 2.5c2.5 0 4.8 1 6.5 2.7a9.2 9.2 0 012.7 6.5c0 5-4.1 9.1-9.1 9.1m7.8-17A11 11 0 0012.1.1c-6 0-11 5-11 11.1 0 2 .5 3.9 1.5 5.5L.1 24l6-1.6c1.6.9 3.4 1.3 5.3 1.3h0c6.1 0 11.1-5 11.1-11.1 0-3-1.1-5.7-3.2-7.8z"/></svg>
        WhatsApp
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<button id="show-hud-btn" onclick="toggleHud()">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-8 8h16z"/></svg>
  Panel
</button>

<div id="modal">
  <div id="modal-box">
    <h2>🛍 Demo en vivo</h2>
    <p>Pega la URL de tu tienda.<br>Se cargará en el teléfono y podrás transmitir.</p>
    <input id="url-input" type="url" placeholder="https://tu-tienda.github.io/?store=ID" autocomplete="off" spellcheck="false" inputmode="url"/>
    <button id="load-btn" onclick="loadStore()">Cargar tienda →</button>
  </div>
</div>

<script>
// ===== CONFIGURACIÓN =====
var RECEPTOR_URL = (function(){
  var base = location.href.replace(/transmisor\.html.*$/, '');
  return base + 'receptor.html';
})();

// ===== VARIABLES GLOBALES =====
var peer = null;
var myPeerID = null;
var clientLink = '';
var connections = {};  // {peerId: conn}
var displayStream = null;
var isLive = false;
var storeURL = '';
var viewerCount = 0;

// ===== INICIALIZACIÓN =====
(function(){
  var p = new URLSearchParams(location.search);
  var u = p.get('url') || p.get('store') || localStorage.getItem('ld_demo_url') || '';
  if(u){ 
    storeURL = u; 
    loadIframe(u); 
    hideModal(); 
  }
})();

function loadStore(){
  var v = document.getElementById('url-input').value.trim();
  if(!v){ return toast('Pega la URL de tu tienda'); }
  if(!/^https?:\/\//.test(v)){ return toast('URL debe empezar con https://'); }
  storeURL = v;
  localStorage.setItem('ld_demo_url', v);
  loadIframe(v);
  hideModal();
  // Actualizar link si ya existe
  if(myPeerID){
    updateClientLink();
  }
}

function loadIframe(url){
  document.getElementById('store-frame').src = url;
}

function hideModal(){
  document.getElementById('modal').classList.add('hidden');
}

function updateClientLink(){
  clientLink = RECEPTOR_URL + '?host=' + encodeURIComponent(myPeerID);
  if(storeURL) clientLink += '&url=' + encodeURIComponent(storeURL);
  document.getElementById('link-url').textContent = clientLink;
  document.getElementById('link-row').classList.add('show');
  document.getElementById('wa-btn').classList.add('ready');
}

// ===== PEERJS =====
function initPeer(){
  setStatus('Conectando al servidor...', '');
  
  // Destruir peer anterior si existe
  if(peer){
    try { peer.destroy(); } catch(e){}
  }
  
  peer = new Peer({
    debug: 0,
    config:{
      iceServers:[
        {urls:'stun:stun.l.google.com:19302'},
        {urls:'stun:stun1.l.google.com:19302'},
        {urls:'stun:stun2.l.google.com:19302'},
        {
          urls: 'turn:openrelay.metered.ca:80',
          username: 'openrelayproject',
          credential: 'openrelayproject'
        },
        {
          urls: 'turn:openrelay.metered.ca:443',
          username: 'openrelayproject',
          credential: 'openrelayproject'
        }
      ],
      iceCandidatePoolSize: 10,
      iceTransportPolicy: 'all'
    }
  });

  peer.on('open', function(id){
    console.log('✅ Transmisor conectado. ID:', id);
    myPeerID = id;
    updateClientLink();
    setStatus('Listo para transmitir', '');
    document.getElementById('stream-btn').disabled = false;
  });

  peer.on('connection', function(conn){
    console.log('🔗 Nueva conexión de:', conn.peer);
    
    conn.on('open', function(){
      connections[conn.peer] = conn;
      viewerCount = Object.keys(connections).length;
      updateViewers();
      
      // Enviar URL de la tienda
      if(storeURL){
        conn.send({type:'store-url', url: storeURL});
      }
      
      // Si ya estamos transmitiendo, iniciar llamada
      if(isLive && displayStream){
        callViewer(conn.peer);
      }
    });
    
    conn.on('data', function(data){
      console.log('📨 Datos recibidos:', data);
      if(data && data.type === 'viewer-hello'){
        console.log('👋 Viewer saludó');
        if(isLive && displayStream){
          callViewer(conn.peer);
        }
      }
    });
    
    conn.on('close', function(){
      console.log('🔌 Conexión cerrada:', conn.peer);
      delete connections[conn.peer];
      viewerCount = Object.keys(connections).length;
      updateViewers();
    });
    
    conn.on('error', function(err){
      console.warn('Error en conexión:', err);
      delete connections[conn.peer];
      viewerCount = Object.keys(connections).length;
      updateViewers();
    });
  });

  peer.on('error', function(err){
    console.error('❌ Error PeerJS:', err);
    setStatus('Error de conexión. Reconectando...', 'off');
    setTimeout(initPeer, 3000);
  });

  peer.on('disconnected', function(){
    console.log('🔌 Desconectado del servidor');
    setStatus('Reconectando...', 'off');
    peer.reconnect();
  });
}

// ===== LLAMADAS =====
function callViewer(peerId){
  if(!displayStream){
    console.warn('No hay stream para enviar');
    return;
  }
  
  console.log('📹 Llamando a:', peerId);
  
  try {
    var call = peer.call(peerId, displayStream, {
      metadata: { type: 'store-stream' }
    });
    
    call.on('stream', function(stream){
      console.log('✅ Stream enviado a:', peerId);
    });
    
    call.on('error', function(err){
      console.warn('Error en llamada a', peerId, ':', err);
    });
    
    call.on('close', function(){
      console.log('📴 Llamada cerrada con:', peerId);
    });
    
  } catch(e){
    console.error('Error al llamar:', e);
  }
}

function updateViewers(){
  document.getElementById('viewers-count').textContent = viewerCount;
  var badge = document.getElementById('viewers-badge');
  badge.classList.toggle('show', viewerCount > 0);
  
  if(isLive){
    setStatus(viewerCount > 0 ? viewerCount + ' viendo en vivo' : 'En vivo — esperando viewers', 'live');
  }
}

// ===== STREAMING =====
var isStartingStream = false;

function toggleStream(){
  if(isStartingStream) return;
  isLive ? stopStream() : startStream();
}

async function startStream(){
  if(!storeURL){ 
    return toast('Primero carga la URL de la tienda'); 
  }
  
  if(isStartingStream) return;
  isStartingStream = true;
  document.getElementById('stream-btn').disabled = true;
  
  try {
    console.log('🎬 Solicitando captura de pantalla...');
    
    displayStream = await navigator.mediaDevices.getDisplayMedia({
      video: {
        displaySurface: 'browser',
        frameRate: { ideal: 30, max: 30 },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    
    console.log('✅ Captura obtenida');
    
    // Detectar cuando el usuario detiene la captura
    displayStream.getVideoTracks()[0].addEventListener('ended', function(){
      console.log('🛑 Captura detenida por el usuario');
      stopStream();
    });
    
    isLive = true;
    updateUIForStreamStart();
    
    // Llamar a todos los viewers conectados
    Object.keys(connections).forEach(function(pid){
      callViewer(pid);
    });
    
    toast('✓ Transmitiendo en vivo');
    
  } catch(err){
    console.error('Error al capturar:', err);
    
    if(err.name === 'NotAllowedError'){
      toast('Permite compartir pantalla para transmitir');
    } else if(err.name === 'AbortError'){
      toast('Captura cancelada');
    } else {
      toast('Error al iniciar transmisión: ' + err.message);
    }
    
    isLive = false;
    displayStream = null;
  } finally {
    isStartingStream = false;
    document.getElementById('stream-btn').disabled = false;
  }
}

function updateUIForStreamStart(){
  var btn = document.getElementById('stream-btn');
  btn.innerHTML = '⏹ Detener';
  btn.classList.add('live');
  document.getElementById('live-badge').classList.add('on');
  setStatus('En vivo', 'live');
}

function stopStream(){
  console.log('🛑 Deteniendo stream...');
  
  if(displayStream){
    displayStream.getTracks().forEach(function(track){
      track.stop();
    });
    displayStream = null;
  }
  
  isLive = false;
  
  var btn = document.getElementById('stream-btn');
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M2 12a10 10 0 0120 0M6 12a6 6 0 0112 0" stroke="currentColor" stroke-width="1.8" fill="none"/></svg> Transmitir';
  btn.classList.remove('live');
  document.getElementById('live-badge').classList.remove('on');
  setStatus('Transmisión detenida', 'off');
  toast('Transmisión detenida');
}

// ===== UTILIDADES =====
function setStatus(txt, state){
  document.getElementById('status-text').textContent = txt;
  var dot = document.getElementById('status-dot');
  dot.className = '';
  if(state === 'live') dot.classList.add('live');
  else if(state === 'off') dot.classList.add('off');
}

function sendWhatsApp(){
  if(!clientLink){ 
    return toast('Espera a que se genere el link...'); 
  }
  var msg = '👀 *Mira mi tienda en vivo*\n\n' + clientLink;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function copyLink(){
  if(!clientLink) return;
  
  navigator.clipboard.writeText(clientLink).then(function(){
    toast('✓ Link copiado');
  }).catch(function(){
    // Fallback para HTTP
    var textarea = document.createElement('textarea');
    textarea.value = clientLink;
    textarea.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      toast('✓ Link copiado');
    } catch(e){
      toast('No se pudo copiar. Copia manualmente.');
    }
    document.body.removeChild(textarea);
  });
}

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(function(){ 
    t.classList.remove('show'); 
  }, 2600);
}

document.getElementById('url-input').addEventListener('keydown', function(e){
  if(e.key === 'Enter') loadStore();
});

// Toggle HUD
var hudVisible = true;
function toggleHud(){
  hudVisible = !hudVisible;
  document.getElementById('hud').classList.toggle('hidden', !hudVisible);
  document.getElementById('show-hud-btn').classList.toggle('visible', !hudVisible);
}

// ===== INICIAR =====
initPeer();
</script>
</body>
</html>
