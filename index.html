<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Transmisor — Tienda Live</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root{--live:#ff2d55;--wa:#25d366;--wa-dark:#1ebe5d;--bg:#08080e;--bar-h:54px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:var(--bg);font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
.topbar{position:fixed;top:0;left:0;right:0;height:var(--bar-h);background:rgba(8,8,14,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100}
.brand{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px}
.rec-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .3s}
.rec-dot.on{background:var(--live);box-shadow:0 0 10px var(--live);animation:blink 1.3s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.status{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.3);transition:color .3s}
.status.on{color:var(--live)}
.frame-wrap{position:fixed;top:var(--bar-h);left:0;right:0;bottom:0}
.frame-wrap iframe{width:100%;height:100%;border:none;display:block;background:#fff}
.preview-wrap{position:fixed;top:var(--bar-h);left:0;right:0;bottom:0;display:none;z-index:50;background:#000}
.preview-wrap.on{display:block}
.preview-wrap video{width:100%;height:100%;object-fit:contain}
.preview-label{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,45,85,.9);color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 14px;border-radius:99px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.preview-label .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
.room-pill{position:fixed;top:calc(var(--bar-h) + 10px);left:50%;transform:translateX(-50%);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:99px;padding:5px 16px;font-size:12px;font-weight:600;color:rgba(255,255,255,.7);z-index:110;display:none;align-items:center;gap:8px;white-space:nowrap;cursor:pointer}
.room-pill.on{display:flex}
.room-pill span{font-family:monospace;color:#fff;font-size:13px;letter-spacing:.05em}
.fabs{position:fixed;bottom:28px;right:16px;display:flex;flex-direction:column;align-items:flex-end;gap:12px;z-index:200}
.fab{display:flex;align-items:center;gap:9px;padding:0 20px 0 14px;height:52px;border-radius:99px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#fff;transition:transform .18s,box-shadow .18s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.93)}
.fab svg{width:20px;height:20px;flex-shrink:0}
.fab-tx{background:var(--live);box-shadow:0 4px 22px rgba(255,45,85,.4)}
.fab-tx.live{background:#16161f;border:2px solid var(--live);color:var(--live);animation:ringPulse 2s ease-in-out infinite}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(255,45,85,.4)}70%{box-shadow:0 0 0 16px rgba(255,45,85,0)}100%{box-shadow:0 0 0 0 rgba(255,45,85,0)}}
.fab-wa{background:var(--wa);box-shadow:0 4px 16px rgba(37,211,102,.35);display:none}
.fab-wa.on{display:flex}
.fab-wa:hover{background:var(--wa-dark)}
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#1c1c28;color:#fff;border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:10px 22px;font-size:12px;font-weight:500;z-index:999;display:none;white-space:nowrap;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.loader{position:fixed;inset:0;top:var(--bar-h);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);z-index:60;font-size:13px;color:rgba(255,255,255,.4)}
.spinner{width:32px;height:32px;border-radius:50%;border:2.5px solid rgba(255,255,255,.08);border-top-color:var(--live);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><div class="rec-dot" id="dot"></div>Tienda Live</div>
  <div class="status" id="status">Listo</div>
</div>
<div class="room-pill" id="room-pill" onclick="copiarCodigo()">
  🔑 Código: <span id="room-id">conectando...</span>
</div>
<div class="frame-wrap">
  <iframe id="tienda"
    src="https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html?backend=https%3A%2F%2Fscript.google.com%2Fmacros%2Fs%2FAKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik%2Fexec&store=store_f2fcc889b992"
    allow="fullscreen" loading="lazy"></iframe>
</div>
<div class="preview-wrap" id="preview-wrap">
  <video id="preview-video" autoplay muted playsinline></video>
  <div class="preview-label"><span class="dot"></span> Transmitiendo en vivo</div>
</div>
<div class="loader" id="loader" style="display:none">
  <div class="spinner"></div>
  <span id="loader-msg">Iniciando...</span>
</div>
<div class="fabs">
  <button class="fab fab-wa" id="fab-wa" onclick="compartirWA()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Compartir transmisión
  </button>
  <button class="fab fab-tx" id="fab-tx" onclick="toggleTx()">
    <svg id="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M8.5 8.5a5 5 0 000 7"/><path d="M15.5 8.5a5 5 0 010 7"/>
      <path d="M5 5a10 10 0 000 14"/><path d="M19 5a10 10 0 010 14"/>
    </svg>
    <span id="fab-lbl">Transmitir</span>
  </button>
</div>
<div id="toast"></div>
<script>
var peer=null,connections=[],localStream=null,myId='',live=false;
function initPeer(){
  var id='lk-'+Math.random().toString(36).slice(2,8).toUpperCase();
  peer=new Peer(id,{host:'0.peerjs.com',port:443,path:'/',secure:true,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  peer.on('open',function(id){myId=id;document.getElementById('room-id').textContent=id;document.getElementById('room-pill').classList.add('on');});
  peer.on('error',function(e){toast('⚠️ '+e.type);});
  peer.on('call',function(call){
    if(localStream){call.answer(localStream);connections.push(call);toast('👁 Receptor conectado');}
  });
}
async function toggleTx(){if(live)stopTx();else await startTx();}
async function startTx(){
  showLoader('Solicitando acceso a pantalla...');
  try{
    localStream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:15},audio:false});
  }catch(e){
    hideLoader();
    toast(e.name==='NotAllowedError'?'❌ Debes aceptar compartir pantalla':'❌ '+(e.message||'Error'));
    return;
  }
  var vid=document.getElementById('preview-video');
  vid.srcObject=localStream;
  document.getElementById('preview-wrap').classList.add('on');
  live=true;hideLoader();setStatus('EN VIVO',true);updateFab(true);
  document.getElementById('fab-wa').classList.add('on');
  localStream.getVideoTracks()[0].onended=function(){stopTx();};
  toast('🔴 Transmitiendo — comparte el código con receptores');
}
function stopTx(){
  live=false;
  if(localStream){localStream.getTracks().forEach(function(t){t.stop();});localStream=null;}
  connections.forEach(function(c){try{c.close();}catch(e){}});connections=[];
  document.getElementById('preview-wrap').classList.remove('on');
  document.getElementById('preview-video').srcObject=null;
  setStatus('Listo',false);updateFab(false);
  document.getElementById('fab-wa').classList.remove('on');
  toast('⏹ Transmisión detenida');
}
function setStatus(t,on){var s=document.getElementById('status');var d=document.getElementById('dot');s.textContent=t;s.classList.toggle('on',on);d.classList.toggle('on',on);}
function updateFab(on){
  var btn=document.getElementById('fab-tx');var lbl=document.getElementById('fab-lbl');var ico=document.getElementById('ico');
  if(on){btn.classList.add('live');lbl.textContent='Detener';ico.innerHTML='<rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>';}
  else{btn.classList.remove('live');lbl.textContent='Transmitir';ico.innerHTML='<circle cx="12" cy="12" r="3"/><path d="M8.5 8.5a5 5 0 000 7"/><path d="M15.5 8.5a5 5 0 010 7"/><path d="M5 5a10 10 0 000 14"/><path d="M19 5a10 10 0 010 14"/>';}
}
function showLoader(m){document.getElementById('loader-msg').textContent=m;document.getElementById('loader').style.display='flex';}
function hideLoader(){document.getElementById('loader').style.display='none';}
function copiarCodigo(){
  if(navigator.clipboard)navigator.clipboard.writeText(myId).then(function(){toast('✅ Código copiado: '+myId);});
  else{var ta=document.createElement('textarea');ta.value=myId;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ Código copiado');}
}
function compartirWA(){
  if(!myId){toast('Espera a que se genere el código');return;}
  var base=location.href.replace(/[^\/]+$/,'');
  var url=base+'receptor.html?room='+myId;
  var msg='🔴 *¡Estoy transmitiendo la tienda EN VIVO!*\n\nEntra aquí para ver mi pantalla en tiempo real:\n'+url+'\n\n🔑 Código de sala: *'+myId+'*';
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},3200);}
window.addEventListener('beforeunload',function(){if(live)stopTx();});
initPeer();
</script>
</body>
</html>
