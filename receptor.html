<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060910">
<title>EasyLink · Ver Tienda</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060910;
  --s1:#0d1117;
  --s2:#161c26;
  --s3:#1e2736;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.15);
  --primary:#2563eb;
  --primary-glow:rgba(37,99,235,.45);
  --green:#10b981;
  --green-glow:rgba(16,185,129,.35);
  --red:#ef4444;
  --font:'DM Sans',sans-serif;
  --text:#e2e8f0;
  --muted:#64748b;
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

/* ── VIDEO FULLSCREEN ── */
#video-wrap{
  position:fixed;inset:0;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  z-index:1;
}

#remote-video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
  display:block;
}

/* ── OVERLAY SUPERIOR ── */
#top-bar{
  position:fixed;top:0;left:0;right:0;
  z-index:10;
  padding-top:max(env(safe-area-inset-top),12px);
  padding-left:16px;padding-right:16px;padding-bottom:20px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  pointer-events:none;
}

.top-brand{display:flex;align-items:center;gap:8px}
.top-icon{
  width:28px;height:28px;border-radius:8px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px var(--primary-glow);
}
.top-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em}
.top-name span{color:#60a5fa}

#live-pill{
  display:flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:99px;
  font-size:10px;font-weight:700;letter-spacing:.07em;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  background:rgba(239,68,68,.85);
  border:1px solid rgba(239,68,68,.5);
  color:#fff;
  box-shadow:0 2px 12px rgba(239,68,68,.4);
  opacity:0;transition:opacity .4s;
}
#live-pill.show{opacity:1}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:#fff;
  animation:blink .8s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── PANTALLA ESPERA ── */
#screen-wait{
  position:fixed;inset:0;z-index:20;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:32px;padding:32px;
  transition:opacity .5s;
}
#screen-wait.gone{opacity:0;pointer-events:none}

.wait-icon{
  width:80px;height:80px;border-radius:22px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px var(--primary-glow);
  animation:glow 3s ease-in-out infinite;
}
@keyframes glow{0%,100%{box-shadow:0 0 30px var(--primary-glow)}50%{box-shadow:0 0 60px var(--primary-glow)}}

.wait-title{font-size:26px;font-weight:700;letter-spacing:-.02em;text-align:center}
.wait-title span{color:#60a5fa}
.wait-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.7;max-width:270px}

.wait-spinner{display:flex;flex-direction:column;align-items:center;gap:12px}
.spinner-ring{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--s3);
  border-top-color:var(--primary);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-txt{font-size:12px;color:var(--muted);font-weight:500}

/* ── PANTALLA ERROR ── */
#screen-error{
  position:fixed;inset:0;z-index:30;
  background:var(--bg);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:24px;padding:32px;text-align:center;
}
#screen-error.show{display:flex}

.err-icon{font-size:48px;line-height:1}
.err-title{font-size:20px;font-weight:700}
.err-msg{font-size:13px;color:var(--muted);line-height:1.7;max-width:280px}
.err-btn{
  padding:14px 28px;border-radius:14px;
  background:var(--primary);color:#fff;
  font-size:14px;font-weight:700;
  border:none;cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 20px var(--primary-glow);
  -webkit-appearance:none;
}

/* ── BOTÓN PLAY MANUAL (tap to play) ── */
#tap-play{
  position:fixed;inset:0;z-index:15;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  flex-direction:column;gap:16px;
}
#tap-play.show{display:flex}
.play-circle{
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  animation:pulse-ring 1.5s ease-in-out infinite;
}
@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.8}}
.play-txt{font-size:14px;font-weight:600;color:rgba(255,255,255,.8);letter-spacing:.02em}

/* ── TOAST ── */
#toast{
  position:fixed;top:max(env(safe-area-inset-top),64px);
  left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:rgba(30,39,54,.96);
  border:1px solid var(--border2);
  color:var(--text);border-radius:12px;
  padding:10px 20px;font-size:12px;font-weight:500;
  z-index:100;pointer-events:none;opacity:0;
  white-space:nowrap;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transition:opacity .25s,transform .25s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FONDO DECORATIVO (visible antes de stream) ── */
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(37,99,235,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(37,99,235,.04) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}
</style>
</head>
<body>

<!-- Fondo decorativo -->
<div class="bg-grid"></div>

<!-- Video fullscreen -->
<div id="video-wrap">
  <video id="remote-video" autoplay playsinline muted></video>
</div>

<!-- Barra superior -->
<div id="top-bar">
  <div class="top-brand">
    <div class="top-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
    </div>
    <div class="top-name">Easy<span>Link</span></div>
  </div>
  <div id="live-pill">
    <div class="live-dot"></div>
    <span>EN VIVO</span>
  </div>
</div>

<!-- Pantalla de espera -->
<div id="screen-wait">
  <div class="wait-icon">
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
  </div>
  <div>
    <div class="wait-title">Easy<span>Link</span></div>
    <div class="wait-sub" style="margin-top:8px">Conectando con el vendedor...<br>La tienda aparecerá en pantalla completa.</div>
  </div>
  <div class="wait-spinner">
    <div class="spinner-ring"></div>
    <div class="spinner-txt" id="wait-txt">Buscando transmisor...</div>
  </div>
</div>

<!-- Pantalla de error -->
<div id="screen-error">
  <div class="err-icon">📡</div>
  <div class="err-title">Sin señal</div>
  <div class="err-msg" id="err-msg">No se pudo conectar con el transmisor. Verifica que el vendedor esté transmitiendo.</div>
  <button class="err-btn" onclick="location.reload()">Reintentar</button>
</div>

<!-- Tap to play (autoplay bloqueado en móvil) -->
<div id="tap-play" onclick="tapToPlay()">
  <div class="play-circle">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>
  </div>
  <div class="play-txt">Toca para ver la tienda</div>
</div>

<div id="toast"></div>

<script>
// ══ OBTENER HOST ID DE LA URL ══════════════════════════════════
var params   = new URLSearchParams(window.location.search);
var HOST_ID  = params.get('host') || '';

var peer     = null;
var myCall   = null;
var retries  = 0;
var MAX_RETRIES = 6;
var connected = false;

// ── INIT ────────────────────────────────────────────────────────
if(!HOST_ID){
  showError('Link inválido. Pide al vendedor que te comparta el link correcto.');
} else {
  initPeer();
}

function initPeer(){
  setWaitTxt('Conectando al servidor...');

  peer = new Peer({
    debug: 0,
    config:{
      iceServers:[
        {urls:'stun:stun.l.google.com:19302'},
        {urls:'stun:stun1.l.google.com:19302'},
        {urls:'stun:stun2.l.google.com:19302'},
        {urls:'turn:a.relay.metered.ca:80',    username:'open', credential:'open'},
        {urls:'turn:a.relay.metered.ca:443',   username:'open', credential:'open'},
        {urls:'turn:a.relay.metered.ca:443?transport=tcp', username:'open', credential:'open'}
      ],
      iceCandidatePoolSize: 10
    }
  });

  peer.on('open', function(myId){
    setWaitTxt('Conectando con el vendedor...');
    // Enviar saludo al transmisor por data channel
    var conn = peer.connect(HOST_ID, {reliable:true});
    conn.on('open', function(){
      conn.send({type:'viewer-hello', name:'Cliente'});
    });
    conn.on('error', function(e){ console.warn('conn error',e); });
  });

  // El transmisor nos llama con el stream
  peer.on('call', function(call){
    myCall = call;
    call.answer(); // sin stream de vuelta

    call.on('stream', function(remoteStream){
      connected = true;
      retries = 0;
      var vid = document.getElementById('remote-video');
      vid.srcObject = remoteStream;

      // Intentar play; si falla (autoplay policy) mostrar botón
      vid.play().then(function(){
        onStreamReady();
      }).catch(function(){
        // Autoplay bloqueado — mostrar tap to play
        document.getElementById('tap-play').classList.add('show');
        document.getElementById('screen-wait').classList.add('gone');
      });
    });

    call.on('close', function(){
      onCallEnded();
    });
    call.on('error', function(e){
      console.warn('call error',e);
      onCallEnded();
    });
  });

  peer.on('error', function(e){
    console.warn('peer error:', e.type, e);
    if(retries < MAX_RETRIES){
      retries++;
      setWaitTxt('Reintentando ('+ retries +'/'+ MAX_RETRIES +')...');
      setTimeout(function(){
        peer.destroy();
        initPeer();
      }, 2500);
    } else {
      showError('No se pudo conectar después de varios intentos. Verifica que el vendedor esté transmitiendo y recarga.');
    }
  });

  peer.on('disconnected', function(){
    if(!connected){
      setWaitTxt('Reconectando...');
      peer.reconnect();
    }
  });
}

// ── STREAM LISTO ────────────────────────────────────────────────
function onStreamReady(){
  document.getElementById('screen-wait').classList.add('gone');
  document.getElementById('tap-play').classList.remove('show');
  document.getElementById('live-pill').classList.add('show');
  toast('🔴 Tienda en vivo');
}

// ── TAP TO PLAY (autoplay blocked) ──────────────────────────────
function tapToPlay(){
  var vid = document.getElementById('remote-video');
  vid.muted = false; // intentar con sonido si hubiera
  vid.play().then(function(){
    onStreamReady();
  }).catch(function(e){
    vid.muted = true;
    vid.play().then(function(){
      onStreamReady();
    }).catch(function(){
      toast('⚠️ No se pudo reproducir');
    });
  });
}

// ── LLAMADA TERMINADA ────────────────────────────────────────────
function onCallEnded(){
  document.getElementById('live-pill').classList.remove('show');
  var vid = document.getElementById('remote-video');
  vid.srcObject = null;

  // Mostrar pantalla de espera para reconexión
  document.getElementById('screen-wait').classList.remove('gone');
  document.getElementById('tap-play').classList.remove('show');
  connected = false;
  retries = 0;
  setWaitTxt('El vendedor pausó la transmisión...');
  toast('📴 Transmisión pausada');

  // Reintentar conexión automáticamente
  setTimeout(function(){
    if(peer && !peer.destroyed){
      peer.destroy();
    }
    initPeer();
  }, 4000);
}

// ── ERROR FATAL ──────────────────────────────────────────────────
function showError(msg){
  document.getElementById('screen-wait').classList.add('gone');
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('screen-error').classList.add('show');
}

// ── HELPERS ──────────────────────────────────────────────────────
function setWaitTxt(t){
  document.getElementById('wait-txt').textContent = t;
}

var _tt;
function toast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

// Mantener pantalla encendida (Wake Lock API)
async function keepAwake(){
  try{
    if('wakeLock' in navigator){
      await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
keepAwake();
</script>
</body>
</html>
