<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>En Vivo — Tienda Solar</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #a3e635; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
        }

        /* Contenedor de Video Fullscreen */
        #video-container {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1;
        }
        video {
            width: 100%; height: 100%;
            object-fit: cover; /* Importante: Esto hace que se vea como TikTok */
        }

        /* Overlay de Interfaz Mobile */
        #ui-layer {
            position: absolute; inset: 0; z-index: 10;
            pointer-events: none; /* Deja pasar los clics al botón de inicio */
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.6) 100%);
        }

        .live-badge {
            background: #ef4444; color: white; padding: 4px 12px;
            border-radius: 4px; font-weight: bold; font-size: 12px;
            display: flex; align-items: center; gap: 5px; align-self: flex-start;
            pointer-events: auto;
        }

        .shop-info {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            color: white; pointer-events: auto;
        }

        #btn-start {
            position: absolute; inset: 0; margin: auto;
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--primary); border: none; color: #064e3b;
            font-weight: bold; font-size: 14px; cursor: pointer;
            z-index: 20; pointer-events: auto;
            box-shadow: 0 0 20px var(--primary);
        }

        #tienda-link {
            display: block; width: 100%; background: var(--primary);
            color: #064e3b; text-align: center; padding: 15px;
            border-radius: 12px; text-decoration: none; font-weight: 800;
            margin-top: 10px; font-size: 16px;
        }
    </style>
</head>
<body>

    <button id="btn-start" onclick="initReceptor()">UNIRSE</button>

    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="ui-layer">
        <div class="live-badge">
            <span style="width:8px; height:8px; background:white; border-radius:50%; animation: pulse 1s infinite;"></span>
            EN VIVO
        </div>

        <div class="shop-info">
            <h3 style="margin-bottom: 5px;">Proyecto Solar Online</h3>
            <p style="font-size: 12px; opacity: 0.8;">Navegando ahora: Ofertas de temporada</p>
            <a id="tienda-link" href="#" target="_blank">IR A LA TIENDA</a>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const hostId = urlParams.get('host');
    const tiendaUrl = urlParams.get('url');

    // Configurar link de la tienda
    if(tiendaUrl) document.getElementById('tienda-link').href = tiendaUrl;

    function initReceptor() {
        if (!hostId) return alert("Falta ID del transmisor");
        
        document.getElementById('btn-start').style.display = 'none';

        const peer = new Peer({
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', () => {
            // Conectar vía datos para avisar que estamos listos
            const conn = peer.connect(hostId);
            
            // Recibir llamada de video
            peer.on('call', (call) => {
                call.answer(); // Aceptar automáticamente
                call.on('stream', (remoteStream) => {
                    const video = document.getElementById('remote-video');
                    video.srcObject = remoteStream;
                    video.play();
                });
            });
        });

        peer.on('error', err => console.error("Peer error:", err));
    }
</script>

<style>
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
</style>
</body>
</html>
