
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060910">
<title>EasyLink · Transmisor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060910;
  --s1:#0d1117;
  --s2:#161c26;
  --s3:#1e2736;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.15);
  --primary:#2563eb;
  --primary-glow:rgba(37,99,235,.45);
  --green:#10b981;
  --green-glow:rgba(16,185,129,.35);
  --red:#ef4444;
  --red-glow:rgba(239,68,68,.4);
  --text:#e2e8f0;
  --muted:#64748b;
  --font:'Space Grotesk',sans-serif;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

/* ── PANTALLA TIENDA (fondo) ── */
#store-frame{
  position:fixed;inset:0;
  width:100%;height:100%;
  border:none;
  background:#fff;
  z-index:1;
}
#frame-loading{
  position:fixed;inset:0;z-index:2;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;
  transition:opacity .5s;
}
#frame-loading.gone{opacity:0;pointer-events:none}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--s3);
  border-top-color:var(--primary);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-brand{display:flex;align-items:center;gap:8px}
.loading-icon{
  width:36px;height:36px;border-radius:10px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px var(--primary-glow);
}
.loading-name{font-size:18px;font-weight:700}
.loading-name span{color:#60a5fa}

/* ── OVERLAY SUPERIOR ── */
#top-overlay{
  position:fixed;top:0;left:0;right:0;
  z-index:10;
  padding-top:max(env(safe-area-inset-top),10px);
  padding-left:14px;padding-right:14px;padding-bottom:16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  pointer-events:none;
}
.top-brand{
  display:flex;align-items:center;gap:8px;
  pointer-events:none;
}
.top-icon{
  width:28px;height:28px;border-radius:8px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px var(--primary-glow);
}
.top-name{font-size:13px;font-weight:700;color:#fff}
.top-name span{color:#60a5fa}

/* Status pill en el top */
#status-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:99px;
  font-size:10px;font-weight:700;letter-spacing:.07em;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:all .3s;pointer-events:none;
}
#status-pill.idle{
  background:rgba(100,116,139,.25);
  border:1px solid rgba(100,116,139,.3);
  color:#94a3b8;
}
#status-pill.live{
  background:rgba(239,68,68,.85);
  border:1px solid rgba(239,68,68,.5);
  color:#fff;
  box-shadow:0 2px 12px var(--red-glow);
}
#status-pill.connected{
  background:rgba(16,185,129,.8);
  border:1px solid rgba(16,185,129,.5);
  color:#fff;
  box-shadow:0 2px 12px var(--green-glow);
}
.pill-dot{
  width:7px;height:7px;border-radius:50%;background:currentColor;
}
#status-pill.live .pill-dot,
#status-pill.connected .pill-dot{
  animation:blink .8s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── PANEL INFERIOR ── */
#bottom-panel{
  position:fixed;bottom:0;left:0;right:0;
  z-index:10;
  padding-bottom:max(env(safe-area-inset-bottom),16px);
  padding-left:20px;padding-right:20px;padding-top:32px;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 100%);
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* Link del cliente */
#link-box{
  background:rgba(15,20,30,.75);
  border:1px solid var(--border2);
  border-radius:14px;
  padding:12px 14px;
  display:none;
  flex-direction:column;
  gap:8px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
#link-box.visible{display:flex}
.link-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.link-url{
  font-size:11px;color:#93c5fd;
  word-break:break-all;line-height:1.5;
  font-family:monospace;
}
.link-actions{display:flex;gap:8px}
.link-btn{
  flex:1;padding:8px 10px;border-radius:10px;
  font-size:11px;font-weight:700;
  border:none;cursor:pointer;font-family:var(--font);
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .15s,opacity .15s;
  -webkit-appearance:none;
}
.link-btn:active{transform:scale(.94)}
.link-btn.copy{background:var(--s3);color:var(--text);border:1px solid var(--border2)}
.link-btn.wa{background:#16a34a;color:#fff;box-shadow:0 2px 10px rgba(22,163,74,.3)}

/* Viewers badge */
#viewers-badge{
  display:none;
  align-items:center;gap:6px;
  font-size:11px;color:#34d399;font-weight:600;
}
#viewers-badge.visible{display:flex}
.v-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green-glow);animation:blink 2s infinite}

/* Botones principales */
.main-actions{display:flex;gap:12px}

#btn-start{
  flex:1;
  padding:18px;border-radius:16px;
  background:var(--primary);color:#fff;
  font-size:15px;font-weight:700;
  border:none;cursor:pointer;font-family:var(--font);
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 24px var(--primary-glow);
  transition:transform .15s,box-shadow .15s;
  -webkit-appearance:none;
}
#btn-start:active{transform:scale(.96);box-shadow:0 2px 12px var(--primary-glow)}
#btn-start:disabled{opacity:.45;pointer-events:none}

#btn-stop{
  display:none;
  flex:1;
  padding:18px;border-radius:16px;
  background:rgba(239,68,68,.15);color:#f87171;
  font-size:15px;font-weight:700;
  border:1.5px solid rgba(239,68,68,.35);
  cursor:pointer;font-family:var(--font);
  align-items:center;justify-content:center;gap:10px;
  transition:transform .15s,background .15s;
  -webkit-appearance:none;
}
#btn-stop:active{transform:scale(.96);background:rgba(239,68,68,.25)}

/* Botón WA standalone (antes de transmitir) */
#btn-wa-solo{
  width:54px;height:54px;border-radius:50%;
  background:#16a34a;color:#fff;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(22,163,74,.35);
  transition:transform .15s;
  flex-shrink:0;
  -webkit-appearance:none;
}
#btn-wa-solo:active{transform:scale(.9)}

/* ── TOAST ── */
#toast{
  position:fixed;top:max(env(safe-area-inset-top),60px);
  left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:rgba(30,39,54,.96);
  border:1px solid var(--border2);
  color:var(--text);border-radius:12px;
  padding:10px 20px;font-size:12px;font-weight:500;
  z-index:100;pointer-events:none;opacity:0;
  white-space:nowrap;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transition:opacity .25s,transform .25s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── PANTALLA INIT (antes de cargar) ── */
#screen-init{
  position:fixed;inset:0;z-index:20;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:28px;padding:32px;
  transition:opacity .5s;
}
#screen-init.gone{opacity:0;pointer-events:none}
.init-brand{display:flex;flex-direction:column;align-items:center;gap:12px}
.init-icon{
  width:72px;height:72px;border-radius:20px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px var(--primary-glow);
  animation:glow 3s ease-in-out infinite;
}
@keyframes glow{0%,100%{box-shadow:0 0 30px var(--primary-glow)}50%{box-shadow:0 0 60px var(--primary-glow)}}
.init-title{font-size:28px;font-weight:700;letter-spacing:-.02em}
.init-title span{color:#60a5fa}
.init-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;max-width:260px}
.init-spinner{
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.init-spinner-ring{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--s3);
  border-top-color:var(--primary);
  animation:spin .7s linear infinite;
}
.init-spinner-txt{font-size:12px;color:var(--muted)}
</style>
</head>

<script>
// ══ CONFIG — CAMBIA ESTOS VALORES ═══════════════════════════
var STORE_URL     = 'https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html?backend=https%3A%2F%2Fscript.google.com%2Fmacros%2Fs%2FAKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik%2Fexec&store=store_f2fcc889b992';
var WA_NUMERO     = '5219999999999'; // ← tu número WhatsApp
var RECEPTOR_BASE = window.location.origin + window.location.pathname.replace('transmisor_movil.html','') + 'receptor_easylink.html';
// ════════════════════════════════════════════════════════════

// Mismos servidores que el receptor — deben coincidir exactamente
var SERVERS = [
  { host:'0.peerjs.com',           port:443, path:'/',       secure:true },
  { host:'peerjs.92k.de',          port:443, path:'/',       secure:true },
  { host:'peer.softinstigate.com', port:443, path:'/peerjs', secure:true }
];
var ICE_CFG = {
  iceServers:[
    { urls:'stun:stun.l.google.com:19302' },
    { urls:'stun:stun1.l.google.com:19302' },
    { urls:'turn:a.relay.metered.ca:80',                username:'open', credential:'open' },
    { urls:'turn:a.relay.metered.ca:443',               username:'open', credential:'open' },
    { urls:'turn:a.relay.metered.ca:443?transport=tcp', username:'open', credential:'open' }
  ],
  iceCandidatePoolSize: 10
};

var peer        = null;
var myPeerID    = '';
var connections = {};
var mediaStream = null;
var isLive      = false;
var clientLink  = '';
var frameLoaded = false;
var srvIdx      = 0;

// ── PEER INIT ────────────────────────────────────────────────
function initPeer(){
  document.getElementById('init-txt').textContent = 'Conectando al servidor...';
  if(peer && !peer.destroyed){ try{ peer.destroy(); }catch(e){} }

  var s = SERVERS[srvIdx % SERVERS.length];
  peer = new Peer({
    host: s.host, port: s.port, path: s.path, secure: s.secure,
    debug: 0, pingInterval: 4000,
    config: ICE_CFG
  });

  var opened = false;
  var timer = setTimeout(function(){
    if(!opened){ srvIdx++; initPeer(); }
  }, 6000);

  peer.on('open', function(id){
    opened = true;
    clearTimeout(timer);
    myPeerID = id;
    document.getElementById('init-txt').textContent = '✅ Listo — cargando tienda...';
    setStatus('idle','Listo');
    document.getElementById('store-frame').src = STORE_URL;
    document.getElementById('btn-start').disabled = false;
  });

  peer.on('connection', function(conn){
    conn.on('data', function(d){
      if(d.type === 'viewer-hello'){
        connections[conn.peer] = {conn:conn, name:d.name||'Cliente'};
        actualizarViewers();
        toast('👀 '+( d.name||'Cliente')+' se conectó');
        if(isLive && mediaStream) llamarViewer(conn.peer);
      }
    });
    conn.on('close', function(){
      delete connections[conn.peer];
      actualizarViewers();
    });
  });

  peer.on('error', function(e){
    console.warn('peer error:', e);
    clearTimeout(timer);
    srvIdx++;
    document.getElementById('init-txt').textContent = 'Reintentando servidor...';
    setTimeout(initPeer, 2000);
  });
}

// ── IFRAME ───────────────────────────────────────────────────
function onFrameLoad(){
  if(!frameLoaded){
    frameLoaded = true;
    // Ocultar pantalla de inicio y loader
    document.getElementById('screen-init').classList.add('gone');
    setTimeout(function(){
      document.getElementById('frame-loading').classList.add('gone');
    }, 300);
  }
}

// ── INICIAR DEMO ─────────────────────────────────────────────
async function iniciarDemo(){
  if(isLive) return;

  // Capturar la pantalla del dispositivo — sin fallback a cámara
  try {
    mediaStream = await navigator.mediaDevices.getDisplayMedia({
      video:{ frameRate:{ideal:30}, width:{ideal:1280} },
      audio:false,
      preferCurrentTab: true
    });
  } catch(e){
    if(e.name === 'NotAllowedError'){
      toast('⚠️ Permiso denegado — acepta compartir pantalla');
    } else {
      toast('⚠️ Tu navegador no soporta compartir pantalla');
    }
    console.warn(e);
    return;
  }

  isLive = true;
  generarLink();
  setStatus('live','EN VIVO');

  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display  = 'flex';
  document.getElementById('btn-wa-solo').style.display = 'none';
  document.getElementById('link-box').classList.add('visible');

  mediaStream.getTracks()[0].onended = detenerDemo;

  // Llamar a viewers ya conectados
  Object.keys(connections).forEach(llamarViewer);

  toast('🔴 Transmisión iniciada');
}

function llamarViewer(viewerId){
  if(!mediaStream || !peer) return;
  var call = peer.call(viewerId, mediaStream);
  call.on('error', function(e){ console.warn('call error',e); });
}

// ── DETENER DEMO ─────────────────────────────────────────────
function detenerDemo(){
  if(!isLive) return;
  isLive = false;

  if(mediaStream){
    mediaStream.getTracks().forEach(function(t){ t.stop(); });
    mediaStream = null;
  }

  setStatus('idle','Listo');
  document.getElementById('btn-start').style.display = 'flex';
  document.getElementById('btn-stop').style.display  = 'none';
  document.getElementById('btn-wa-solo').style.display = 'flex';
  document.getElementById('link-box').classList.remove('visible');
  document.getElementById('viewers-badge').classList.remove('visible');

  toast('⏹ Demo detenida');
}

// ── LINK CLIENTE ─────────────────────────────────────────────
function generarLink(){
  clientLink = RECEPTOR_BASE + '?host=' + encodeURIComponent(myPeerID);
  document.getElementById('link-url-txt').textContent = clientLink;
}

function copiarLink(){
  if(!clientLink){ toast('Inicia la demo primero'); return; }
  navigator.clipboard.writeText(clientLink)
    .then(function(){ toast('✅ Link copiado'); })
    .catch(function(){
      // Fallback para navegadores sin clipboard API
      var ta = document.createElement('textarea');
      ta.value = clientLink;
      document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      ta.remove();
      toast('✅ Link copiado');
    });
}

function enviarWA(){
  var link = clientLink || (RECEPTOR_BASE + '?host=' + myPeerID);
  var msg  = '🛍️ ¡Mira mi tienda en vivo!\n\nAbre este link y verás exactamente lo que te estoy mostrando:\n\n' + link + '\n\n_(Powered by EasyLink)_';
  window.open('https://wa.me/' + WA_NUMERO + '?text=' + encodeURIComponent(msg), '_blank');
}

// ── STATUS ───────────────────────────────────────────────────
function setStatus(cls, txt){
  var p = document.getElementById('status-pill');
  p.className = cls;
  document.getElementById('status-txt').textContent = txt;
}

function actualizarViewers(){
  var ids = Object.keys(connections);
  var badge = document.getElementById('viewers-badge');
  if(ids.length > 0){
    badge.classList.add('visible');
    document.getElementById('viewers-txt').textContent = ids.length + ' viewer' + (ids.length>1?'s':'') + ' en vivo';
    setStatus('connected', ids.length + ' viewer' + (ids.length>1?'s':''));
  } else {
    badge.classList.remove('visible');
    if(isLive) setStatus('live','EN VIVO');
  }
}

// ── TOAST ────────────────────────────────────────────────────
var _tt;
function toast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

// ── ARRANCAR ─────────────────────────────────────────────────
initPeer();
</script>
</body>
</html>
