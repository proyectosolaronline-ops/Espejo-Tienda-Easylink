<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Receptor — Tienda Live</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root{--live:#ff2d55;--bg:#08080e;--bar-h:54px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:var(--bg);font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
.topbar{position:fixed;top:0;left:0;right:0;height:var(--bar-h);background:rgba(8,8,14,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100}
.brand{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px}
.live-badge{display:flex;align-items:center;gap:5px;background:var(--live);border-radius:99px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;color:#fff;text-transform:uppercase;opacity:0;transition:opacity .4s}
.live-badge.on{opacity:1}
.live-badge .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.video-wrap{position:fixed;top:var(--bar-h);left:0;right:0;bottom:0;background:#000;display:none}
.video-wrap.on{display:block}
.video-wrap video{width:100%;height:100%;object-fit:contain;display:block}

.waiting{position:fixed;top:var(--bar-h);left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;text-align:center}
.w-icon{width:80px;height:80px;border-radius:50%;background:rgba(255,45,85,.1);border:2px solid rgba(255,45,85,.22);display:flex;align-items:center;justify-content:center;animation:pulseW 2.5s ease-in-out infinite}
@keyframes pulseW{0%,100%{box-shadow:0 0 0 0 rgba(255,45,85,.3)}50%{box-shadow:0 0 0 20px rgba(255,45,85,0)}}
.w-icon svg{width:34px;height:34px;color:var(--live)}
.waiting h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:-.02em}
.waiting p{font-size:13px;color:rgba(255,255,255,.38);line-height:1.65;max-width:270px}

.code-form{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:300px}
.code-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.14);border-radius:12px;font-family:monospace;font-size:18px;font-weight:700;color:#fff;text-align:center;letter-spacing:.1em;outline:none;transition:border-color .2s;text-transform:uppercase}
.code-input:focus{border-color:var(--live)}
.code-input::placeholder{color:rgba(255,255,255,.2);font-size:13px;letter-spacing:.04em;font-family:'DM Sans',sans-serif;font-weight:400}
.btn-connect{width:100%;padding:14px;background:var(--live);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 18px rgba(255,45,85,.4)}
.btn-connect:active{transform:scale(.96)}
.btn-connect:disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.3);box-shadow:none;cursor:default}

.dots{display:flex;gap:6px;margin-top:4px}
.dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,45,85,.5);animation:dotP .8s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes dotP{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.5);opacity:1}}

.signal-lost{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a0810;border:1px solid rgba(255,45,85,.4);border-radius:12px;padding:10px 20px;font-size:12px;font-weight:600;color:var(--live);z-index:200;display:none;white-space:nowrap}
.signal-lost.on{display:block}

.loader{position:fixed;inset:0;top:var(--bar-h);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);z-index:60;font-size:13px;color:rgba(255,255,255,.4)}
.loader.on{display:flex}
.spinner{width:32px;height:32px;border-radius:50%;border:2.5px solid rgba(255,255,255,.08);border-top-color:var(--live);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Auto-conectando overlay */
.auto-msg{font-size:12px;color:rgba(255,255,255,.35);margin-top:-8px}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1c1c28;color:#fff;border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:10px 22px;font-size:12px;font-weight:500;z-index:999;display:none;white-space:nowrap;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">📺 Tienda Live</div>
  <div class="live-badge" id="live-badge"><span class="dot"></span> EN VIVO</div>
</div>

<div class="video-wrap" id="video-wrap">
  <video id="stream-video" autoplay playsinline></video>
</div>

<div class="waiting" id="waiting">
  <div class="w-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M8.5 8.5a5 5 0 000 7"/><path d="M15.5 8.5a5 5 0 010 7"/>
      <path d="M5 5a10 10 0 000 14"/><path d="M19 5a10 10 0 010 14"/>
    </svg>
  </div>
  <h2>Ver transmisión</h2>
  <p id="waiting-desc">Ingresa el código que te compartió el transmisor</p>
  <div class="code-form">
    <input class="code-input" id="code-input" type="text" placeholder="Ej: LK-AB12CD" maxlength="12" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')conectar()"/>
    <button class="btn-connect" id="btn-connect" onclick="conectar()">Conectar y ver en vivo</button>
  </div>
  <div class="dots" id="dots" style="display:none"><span></span><span></span><span></span></div>
  <div class="auto-msg" id="auto-msg"></div>
</div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <span id="loader-msg">Conectando...</span>
</div>

<div class="signal-lost" id="signal-lost">⚡ Señal perdida...</div>
<div id="toast"></div>

<script>
var peer=null, conn=null, watching=false, autoRoom=null;

// Leer código de URL
(function(){
  var params=new URLSearchParams(location.search);
  var room=params.get('room');
  if(room){
    autoRoom=room.toUpperCase();
    document.getElementById('code-input').value=autoRoom;
    document.getElementById('waiting-desc').textContent='Conectando automáticamente a la transmisión en vivo...';
    document.getElementById('auto-msg').textContent='Código: '+autoRoom;
    document.getElementById('dots').style.display='flex';
    document.getElementById('btn-connect').disabled=true;
  }
})();

function initPeer(cb){
  peer=new Peer({
    host:'0.peerjs.com',port:443,path:'/',secure:true,
    config:{iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'stun:stun.cloudflare.com:3478'}
    ]}
  });
  peer.on('open',function(){ cb&&cb(); });
  peer.on('error',function(e){
    document.getElementById('loader').classList.remove('on');
    document.getElementById('dots').style.display='none';
    document.getElementById('btn-connect').disabled=false;
    toast('⚠️ Error: '+e.type);
  });
}

// Si viene autoRoom, iniciar peer y conectar automáticamente
if(autoRoom){
  // Pequeño delay para que la página cargue visualmente primero
  setTimeout(function(){
    initPeer(function(){ llamar(autoRoom); });
  }, 800);
}

function conectar(){
  var code=(document.getElementById('code-input').value||'').trim().toUpperCase();
  if(!code||code.length<4){toast('Ingresa el código del transmisor');return;}
  document.getElementById('btn-connect').disabled=true;
  document.getElementById('dots').style.display='flex';
  document.getElementById('loader').classList.add('on');
  document.getElementById('loader-msg').textContent='Conectando con el transmisor...';
  if(peer&&!peer.destroyed){ llamar(code); }
  else { initPeer(function(){ llamar(code); }); }
}

function llamar(remoteId){
  document.getElementById('loader').classList.add('on');
  document.getElementById('loader-msg').textContent='Conectando con el transmisor...';

  var fakeStream=new MediaStream();
  var call=peer.call(remoteId,fakeStream);
  if(!call){
    toast('❌ No se pudo conectar. Verifica el código.');
    document.getElementById('loader').classList.remove('on');
    document.getElementById('btn-connect').disabled=false;
    document.getElementById('dots').style.display='none';
    return;
  }
  call.on('stream',function(remoteStream){
    var vid=document.getElementById('stream-video');
    vid.srcObject=remoteStream;
    vid.play().catch(function(){});
    document.getElementById('video-wrap').classList.add('on');
    document.getElementById('waiting').style.display='none';
    document.getElementById('live-badge').classList.add('on');
    document.getElementById('loader').classList.remove('on');
    watching=true;
    toast('🔴 ¡Conectado! Viendo en vivo');
  });
  call.on('close',function(){ perderSenal(); });
  call.on('error',function(){ perderSenal(); });
  conn=call;

  // Timeout 15s
  setTimeout(function(){
    if(!watching){
      document.getElementById('loader').classList.remove('on');
      document.getElementById('btn-connect').disabled=false;
      document.getElementById('dots').style.display='none';
      document.getElementById('waiting-desc').textContent='Sin respuesta. ¿El transmisor está activo?';
      toast('⏱ Sin respuesta — verifica que el transmisor esté activo');
    }
  },15000);
}

function perderSenal(){
  watching=false;
  document.getElementById('signal-lost').classList.add('on');
  document.getElementById('live-badge').classList.remove('on');
  setTimeout(function(){
    document.getElementById('video-wrap').classList.remove('on');
    document.getElementById('waiting').style.display='flex';
    document.getElementById('signal-lost').classList.remove('on');
    document.getElementById('btn-connect').disabled=false;
    document.getElementById('dots').style.display='none';
    document.getElementById('waiting-desc').textContent='Ingresa el código que te compartió el transmisor';
    toast('⏹ Transmisión finalizada');
  },4000);
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(function(){ t.style.display='none'; },3200);
}
</script>
</body>
</html>
